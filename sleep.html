<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dreamland 🌙 | Our Magical Love</title>
    <link rel="shortcut icon" href="https://raw.githubusercontent.com/LeTrollologist/anya.github.io/refs/heads/main/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink: #ff69b4;
            --purple: #7b61ff;
            --glass: rgba(15, 15, 35, 0.7);
            --border: rgba(255, 255, 255, 0.12);
            --glow: 0 0 20px rgba(255, 105, 180, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: #05050a;
            color: white;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            height: -webkit-fill-available;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Animated Celestial Background */
        #bg-canvas { position: fixed; inset: 0; z-index: 0; }
        .nebula {
            position: fixed; inset: 0;
            background: radial-gradient(circle at 50% 100%, rgba(123, 97, 255, 0.15), transparent 60%);
            z-index: 1; pointer-events: none;
        }

        header {
            position: relative; z-index: 10;
            padding: 20px;
            text-align: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
        }

        header h1 {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(1.5rem, 6vw, 2.2rem);
            color: var(--pink);
            text-shadow: var(--glow);
        }

        nav {
            display: flex; justify-content: center; gap: 15px; margin-top: 10px;
        }

        nav a {
            text-decoration: none; color: rgba(255,255,255,0.5);
            font-size: 0.65rem; font-weight: 600; letter-spacing: 1.5px;
            text-transform: uppercase; transition: 0.3s;
        }

        nav a.active { color: white; border-bottom: 1px solid var(--pink); }

        /* Main Content App Container */
        main {
            position: relative; z-index: 10;
            flex: 1;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 20px;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .hero-section { text-align: center; }
        .hero-section h2 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 10vw, 5rem);
            font-style: italic;
            margin-bottom: 5px;
            background: linear-gradient(to bottom, #fff, #ffd6f0);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* The Player Card */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 25px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            animation: slideUp 0.8s cubic-bezier(0.2, 1, 0.3, 1);
        }

        #yt-placeholder {
            width: 100%; aspect-ratio: 16/9;
            background: #000; border-radius: 18px;
            overflow: hidden; margin-bottom: 20px;
            position: relative;
        }
        
        #yt-placeholder iframe { pointer-events: none; }
        .click-blocker { position: absolute; inset: 0; z-index: 5; }

        /* Controls Grid */
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .full-width { grid-column: span 2; }

        .btn-play {
            background: white; border: none;
            width: 60px; height: 60px; border-radius: 50%;
            cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 15px;
        }
        .btn-play svg { width: 24px; fill: black; }
        .btn-play:active { transform: scale(0.9); }

        .input-group {
            display: flex; flex-direction: column; gap: 5px;
        }

        .input-group label {
            font-size: 0.6rem; text-transform: uppercase;
            letter-spacing: 1px; color: rgba(255,255,255,0.5);
        }

        select, input[type="time"] {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: white; padding: 10px; border-radius: 12px;
            outline: none; font-size: 0.9rem;
        }

        .timer-display {
            font-family: monospace; color: var(--pink);
            font-size: 1.2rem; text-align: center; margin-top: 10px;
        }

        /* Alarm Notification */
        #alarm-modal {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
            background: var(--pink); color: white; padding: 15px 30px;
            border-radius: 50px; z-index: 100; font-weight: bold;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(255,105,180,0.5);
        }
        #alarm-modal.active { transform: translateX(-50%) translateY(0); }

        footer {
            position: relative; z-index: 10;
            padding: 20px; text-align: center;
            font-size: 0.7rem; opacity: 0.4;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            .glass-card { padding: 20px; border-radius: 24px; }
            .hero-section h2 { font-size: 2.5rem; }
            .controls { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>

<div class="nebula"></div>
<canvas id="bg-canvas"></canvas>

<div id="alarm-modal">🌅 Good Morning, My Love!</div>

<header>
    <h1>Our Magical Love</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="#" class="active">Sleep</a>
        <a href="index.html">Album</a>
    </nav>
</header>

<main>
    <div class="hero-section">
        <h2 id="greet">Dreamland</h2>
        <p style="font-size: 0.8rem; opacity: 0.7; letter-spacing: 2px; text-transform: uppercase;">A sanctuary for your soul</p>
    </div>

    <div class="glass-card">
        <div id="yt-placeholder">
            <div id="ytplayer"></div>
            <div class="click-blocker"></div>
        </div>

        <button class="btn-play" onclick="togglePlay()" id="playBtn">
            <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>

        <div class="controls">
            <!-- Sleep Timer -->
            <div class="input-group">
                <label>Sleep Timer</label>
                <select id="sleepTimer" onchange="setSleepTimer(this.value)">
                    <option value="0">Off</option>
                    <option value="30">30 Minutes</option>
                    <option value="60">1 Hour</option>
                    <option value="240">4 Hours</option>
                    <option value="480">8 Hours</option>
                    <option value="600">10 Hours</option>
                </select>
                <div id="timerDisplay" class="timer-display"></div>
            </div>

            <!-- Alarm Clock -->
            <div class="input-group">
                <label>Set Alarm</label>
                <input type="time" id="alarmTime" onchange="setAlarm(this.value)">
                <div id="alarmStatus" style="font-size: 0.6rem; text-align: center; margin-top: 5px; color: var(--purple);"></div>
            </div>

            <!-- Volume -->
            <div class="input-group full-width" style="margin-top: 10px;">
                <label>Atmosphere Volume</label>
                <input type="range" id="volSlider" min="0" max="100" value="40" oninput="changeVolume(this.value)" style="accent-color: var(--pink);">
            </div>
        </div>
    </div>
</main>

<footer>© 2026 • HANDCRAFTED WITH LOVE</footer>

<!-- Audio for Alarm -->
<audio id="alarmSound" loop src="https://assets.mixkit.co/sfx/preview/mixkit-morning-clock-alarm-1003.mp3"></audio>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
    let ytPlayer, sleepTimeout, countdownInterval, alarmTime = null;
    const playIcon = `<path d="M8 5v14l11-7z"/>`;
    const pauseIcon = `<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>`;

    // Initialize YouTube
    function onYouTubeIframeAPIReady() {
        ytPlayer = new YT.Player('ytplayer', {
            height: '100%', width: '100%',
            videoId: 'Dfm2rB-nQ9Y', // Cosmic Lullaby
            playerVars: { controls: 0, modestbranding: 1, rel: 0, loop: 1, playlist: 'Dfm2rB-nQ9Y' },
            events: { 'onStateChange': updatePlayButton }
        });
    }

    function togglePlay() {
        if (!ytPlayer) return;
        ytPlayer.getPlayerState() === 1 ? ytPlayer.pauseVideo() : ytPlayer.playVideo();
    }

    function updatePlayButton(e) {
        const svg = document.getElementById('play-icon');
        svg.innerHTML = (e.data === 1) ? pauseIcon : playIcon;
    }

    function changeVolume(v) { if(ytPlayer) ytPlayer.setVolume(v); }

    // ORIGINAL SLEEP TIMER LOGIC
    function setSleepTimer(minutes) {
        clearTimeout(sleepTimeout);
        clearInterval(countdownInterval);
        const display = document.getElementById("timerDisplay");
        if (minutes == 0) { display.innerText = ""; return; }

        let seconds = minutes * 60;
        countdownInterval = setInterval(() => {
            seconds--;
            let m = Math.floor(seconds / 60);
            let s = seconds % 60;
            display.innerText = `${m}:${s.toString().padStart(2, '0')}`;
            if (seconds <= 0) clearInterval(countdownInterval);
        }, 1000);

        sleepTimeout = setTimeout(() => {
            let vol = ytPlayer.getVolume();
            let fade = setInterval(() => {
                vol -= 2;
                if (vol <= 0) {
                    clearInterval(fade);
                    ytPlayer.pauseVideo();
                    ytPlayer.setVolume(40);
                } else {
                    ytPlayer.setVolume(vol);
                }
            }, 200);
        }, minutes * 60000);
    }

    // ALARM SYSTEM
    function setAlarm(time) {
        alarmTime = time;
        document.getElementById("alarmStatus").innerText = time ? `🔔 Set for ${time}` : "";
    }

    function checkAlarm() {
        if (!alarmTime) return;
        const now = new Date();
        const current = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
        
        if (current === alarmTime) {
            triggerAlarm();
            alarmTime = null; // Reset
            document.getElementById("alarmStatus").innerText = "";
        }
    }
    setInterval(checkAlarm, 1000);

    function triggerAlarm() {
        const modal = document.getElementById("alarm-modal");
        const sound = document.getElementById("alarmSound");
        modal.classList.add("active");
        sound.play();
        
        setTimeout(() => {
            modal.classList.remove("active");
            // Softly stop sound after 30 seconds if not handled
            setTimeout(() => { sound.pause(); sound.currentTime = 0; }, 30000);
        }, 10000);
    }

    /* ====== CELESTIAL CANVAS ====== */
    const canvas = document.getElementById("bg-canvas");
    const ctx = canvas.getContext("2d");
    let stars = [];

    function initStars() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        stars = [];
        const count = window.innerWidth < 500 ? 80 : 200;
        for (let i = 0; i < count; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 1.5,
                opacity: Math.random(),
                speed: Math.random() * 0.1
            });
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        stars.forEach(s => {
            ctx.fillStyle = `rgba(255, 255, 255, ${s.opacity})`;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
            ctx.fill();
            s.y -= s.speed;
            if (s.y < 0) s.y = canvas.height;
        });
        requestAnimationFrame(draw);
    }

    window.addEventListener('resize', initStars);
    initStars();
    draw();
</script>
</body>
</html>
