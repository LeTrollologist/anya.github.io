<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dreamland 🌙</title>
    <link rel="shortcut icon" href="https://raw.githubusercontent.com/LeTrollologist/anya.github.io/refs/heads/main/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink: #ff89cc;
            --purple: #9d85ff;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-heavy: rgba(10, 10, 20, 0.8);
            --border: rgba(255, 255, 255, 0.1);
            --accent-gradient: linear-gradient(135deg, var(--pink), var(--purple));
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: #020205;
            color: white;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- BACKGROUND ENGINE --- */
        #canvas-wrap { position: fixed; inset: 0; z-index: 0; }
        .nebula-glow {
            position: fixed; inset: 0;
            background: radial-gradient(circle at 50% 50%, rgba(157, 133, 255, 0.1), transparent 70%);
            pointer-events: none; z-index: 1;
        }

        header {
            position: relative; z-index: 20;
            padding: 25px;
            display: flex; flex-direction: column; align-items: center;
        }

        header h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 2.2rem;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(255, 137, 204, 0.3));
        }

        nav { display: flex; gap: 20px; margin-top: 12px; }
        nav a {
            text-decoration: none; color: rgba(255,255,255,0.4);
            font-size: 0.7rem; font-weight: 600; letter-spacing: 2px;
            text-transform: uppercase; transition: 0.4s;
        }
        nav a.active { color: white; text-shadow: 0 0 10px var(--pink); }

        /* --- MAIN UI --- */
        main {
            position: relative; z-index: 10;
            flex: 1; display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }

        .app-shell {
            width: 100%; max-width: 480px;
            background: var(--glass-heavy);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 30px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            position: relative;
        }

        /* Player Visual */
        .player-container {
            width: 100%; aspect-ratio: 16/9;
            background: #000; border-radius: 25px;
            overflow: hidden; position: relative;
            box-shadow: 0 0 30px rgba(157, 133, 255, 0.1);
            margin-bottom: 25px;
        }
        #ytplayer { pointer-events: none; opacity: 0.8; }
        .click-shield { position: absolute; inset: 0; z-index: 5; }

        .play-trigger {
            width: 70px; height: 70px;
            background: white; border: none; border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            margin: -60px auto 25px; position: relative; z-index: 15;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .play-trigger:active { transform: scale(0.9); }
        .play-trigger svg { width: 28px; fill: #000; }

        /* --- ADVANCED CONTROLS --- */
        .controls-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
        }

        .control-item { display: flex; flex-direction: column; gap: 8px; }
        .label {
            font-size: 0.65rem; text-transform: uppercase;
            letter-spacing: 1.5px; color: var(--pink); font-weight: 600;
        }

        /* Custom Dropdown Styling */
        .custom-select {
            position: relative; cursor: pointer;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 15px; padding: 12px;
            font-size: 0.9rem; transition: 0.3s;
        }
        .custom-select:hover { background: rgba(255,255,255,0.1); }

        /* Advanced Date/Time Selector */
        input[type="datetime-local"] {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 15px; padding: 10px;
            color: white; color-scheme: dark; font-family: inherit;
            outline: none; font-size: 0.85rem; width: 100%;
        }

        input[type="range"] {
            width: 100%; accent-color: var(--pink); margin-top: 10px;
        }

        .timer-countdown {
            text-align: center; font-family: 'monospace';
            font-size: 1.4rem; margin-top: 15px; color: var(--purple);
            text-shadow: 0 0 10px rgba(157, 133, 255, 0.5);
        }

        /* Alarm Modal */
        #alarm-ring {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px;
            background: white; color: black; padding: 20px;
            border-radius: 20px; z-index: 1000; text-align: center;
            transition: 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        #alarm-ring.active { top: 30px; }
        .stop-btn {
            background: var(--pink); border: none; color: white;
            padding: 10px 25px; border-radius: 30px; margin-top: 10px;
            cursor: pointer; font-weight: bold;
        }

        footer {
            padding: 20px; text-align: center; font-size: 0.65rem;
            opacity: 0.4; letter-spacing: 1px;
        }

        @media (max-width: 400px) {
            .app-shell { padding: 20px; }
            .controls-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div id="canvas-wrap"><canvas id="bg-canvas"></canvas></div>
<div class="nebula-glow"></div>

<div id="alarm-ring">
    <h3 style="font-family: 'Playfair Display'">Time to wake up, my love 🤍</h3>
    <button class="stop-btn" onclick="stopAlarm()">Dismiss Alarm</button>
</div>

<header>
    <h1>Our Magical Love</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="#" class="active">Sleep</a>
        <a href="index.html">Album</a>
    </nav>
</header>

<main>
    <div class="app-shell">
        <div class="player-container">
            <div id="ytplayer"></div>
            <div class="click-shield"></div>
        </div>

        <button class="play-trigger" onclick="togglePlay()" id="playBtn">
            <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>

        <div class="controls-grid">
            <!-- Sleep Timer -->
            <div class="control-item">
                <span class="label">Sleep Timer</span>
                <select class="custom-select" id="sleepTimer" onchange="setSleepTimer(this.value)">
                    <option value="0">Disabled</option>
                    <option value="30">30 Minutes</option>
                    <option value="60">1 Hour</option>
                    <option value="240">4 Hours</option>
                    <option value="480">8 Hours</option>
                    <option value="600">10 Hours</option>
                </select>
            </div>

            <!-- Date/Time Alarm -->
            <div class="control-item">
                <span class="label">Set Alarm</span>
                <input type="datetime-local" id="alarmDateTime" onchange="setAlarm(this.value)">
            </div>

            <!-- Volume Slider -->
            <div class="control-item" style="grid-column: span 2; margin-top: 10px;">
                <div style="display:flex; justify-content:space-between">
                    <span class="label">Volume</span>
                    <span id="volLevel" class="label">40%</span>
                </div>
                <input type="range" id="volSlider" min="0" max="100" value="40" oninput="changeVolume(this.value)">
            </div>
        </div>

        <div id="timerDisplay" class="timer-countdown"></div>
    </div>
</main>

<footer>EST. 2026 • DESIGNED FOR SOMEONE CUTE</footer>

<audio id="alarmAudio" loop src="https://assets.mixkit.co/sfx/preview/mixkit-morning-clock-alarm-1003.mp3"></audio>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
    let ytPlayer, sleepTimeout, countdownInterval, alarmTarget = null;
    const playIcon = `<path d="M8 5v14l11-7z"/>`;
    const pauseIcon = `<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>`;

    // Initialize YouTube
    function onYouTubeIframeAPIReady() {
        ytPlayer = new YT.Player('ytplayer', {
            height: '100%', width: '100%',
            videoId: 'Dfm2rB-nQ9Y',
            playerVars: { controls: 0, modestbranding: 1, rel: 0, loop: 1, playlist: 'Dfm2rB-nQ9Y' },
            events: { 'onStateChange': (e) => {
                document.getElementById('play-icon').innerHTML = (e.data === 1) ? pauseIcon : playIcon;
            }}
        });
    }

    function togglePlay() {
        if (!ytPlayer) return;
        ytPlayer.getPlayerState() === 1 ? ytPlayer.pauseVideo() : ytPlayer.playVideo();
    }

    function changeVolume(v) {
        if(ytPlayer) ytPlayer.setVolume(v);
        document.getElementById('volLevel').innerText = v + "%";
    }

    // --- SLEEP TIMER ---
    function setSleepTimer(minutes) {
        clearTimeout(sleepTimeout);
        clearInterval(countdownInterval);
        const display = document.getElementById("timerDisplay");
        if (minutes == 0) { display.innerText = ""; return; }

        let seconds = minutes * 60;
        countdownInterval = setInterval(() => {
            seconds--;
            let h = Math.floor(seconds / 3600);
            let m = Math.floor((seconds % 3600) / 60);
            let s = seconds % 60;
            display.innerText = `${h > 0 ? h + ':' : ''}${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            if (seconds <= 0) clearInterval(countdownInterval);
        }, 1000);

        sleepTimeout = setTimeout(() => {
            // Smooth Fade Out Logic
            let vol = ytPlayer.getVolume();
            let fade = setInterval(() => {
                vol -= 2;
                if (vol <= 0) {
                    clearInterval(fade);
                    ytPlayer.pauseVideo();
                    ytPlayer.setVolume(40);
                } else {
                    ytPlayer.setVolume(vol);
                }
            }, 200);
        }, minutes * 60000);
    }

    // --- ADVANCED DATE ALARM ---
    function setAlarm(val) {
        if(!val) return;
        alarmTarget = new Date(val).getTime();
    }

    function checkAlarm() {
        if (!alarmTarget) return;
        const now = new Date().getTime();
        
        if (now >= alarmTarget) {
            triggerAlarm();
            alarmTarget = null;
            document.getElementById('alarmDateTime').value = "";
        }
    }
    setInterval(checkAlarm, 1000);

    function triggerAlarm() {
        document.getElementById("alarm-ring").classList.add("active");
        document.getElementById("alarmAudio").play();
    }

    function stopAlarm() {
        document.getElementById("alarm-ring").classList.remove("active");
        const audio = document.getElementById("alarmAudio");
        audio.pause();
        audio.currentTime = 0;
    }

    /* --- STELLAR CANVAS ENGINE --- */
    const canvas = document.getElementById("bg-canvas");
    const ctx = canvas.getContext("2d");
    let stars = [];

    function initStars() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        stars = [];
        for (let i = 0; i < 150; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                z: Math.random() * canvas.width,
                o: Math.random(),
                s: Math.random() * 2
            });
        }
    }

    function draw() {
        ctx.fillStyle = "#020205";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        stars.forEach(s => {
            let x = (s.x - canvas.width / 2) * (canvas.width / s.z) + canvas.width / 2;
            let y = (s.y - canvas.height / 2) * (canvas.width / s.z) + canvas.height / 2;
            let sz = s.s * (canvas.width / s.z);
            
            ctx.fillStyle = `rgba(255, 255, 255, ${s.o})`;
            ctx.beginPath();
            ctx.arc(x, y, sz, 0, Math.PI * 2);
            ctx.fill();
            
            s.z -= 0.5;
            if (s.z <= 0) s.z = canvas.width;
        });
        requestAnimationFrame(draw);
    }

    window.addEventListener('resize', initStars);
    initStars();
    draw();
</script>
</body>
</html>
