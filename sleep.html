*{margin:0;padding:0;box-sizing:border-box;}

display:flex; flex-wrap: wrap; justify-content:center; align-items:center; gap:20px;

/* ================= SLEEP UI & GLASSMORPHISM ================= */
.sleep-container {
position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
display: flex; flex-direction: column; align-items: center; gap: 20px;
width: 95%; max-width: 750px; z-index: 20;

.page-title {

text-shadow:0 0 25px rgba(255, 105, 180, 0.8);
}
.sub-title {

margin-bottom: 10px; text-shadow: 0 0 10px black; color: #ffd6f0;

@keyframes floatText{50%{transform:translateY(-10px);}}

/* Custom YouTube Player Wrapper /
.player-wrapper {
position: relative; width: 100%; aspect-ratio: 16/9; border-radius: 20px;
overflow: hidden; background: #050510; border: 1px solid rgba(255,255,255,0.15);
box-shadow: 0 0 30px rgba(0, 0, 0, 0.8); transition: box-shadow 3s ease;
}
/ This invisible div sits ON TOP of the iframe to prevent clicking the actual YouTube video UI /
.click-blocker {
position: absolute; inset: 0; z-index: 10; cursor: default;
}
.player-wrapper iframe {
position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; / Over-scale to hide YT watermarks */
transform: scale(0.6); pointer-events: none; filter: brightness(0.8) contrast(1.1);
}

/* Ambient Aura Animation */
.player-wrapper.playing { animation: auraPulse 8s infinite alternate ease-in-out; }
@keyframes auraPulse {
0% { box-shadow: 0 0 40px rgba(75, 0, 130, 0.6), 0 0 80px rgba(75, 0, 130, 0.3); border-color: rgba(75, 0, 130, 0.5); }
50% { box-shadow: 0 0 60px rgba(138, 43, 226, 0.5), 0 0 100px rgba(138, 43, 226, 0.2); border-color: rgba(138, 43, 226, 0.5); }
100% { box-shadow: 0 0 50px rgba(255, 105, 180, 0.4), 0 0 90px rgba(255, 105, 180, 0.2); border-color: rgba(255, 105, 180, 0.5); }
}

/* Custom Controls Glass Panel */
.glass-controls {
background: rgba(20, 15, 35, 0.6); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
border: 1px solid rgba(255, 105, 180, 0.3); border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
display: flex; flex-wrap: wrap; gap: 20px; padding: 15px 25px; width: 100%;
justify-content: space-between; align-items: center; color: white;
}

.play-btn {
background: linear-gradient(145deg, #ff9ec4, #ff69b4); border: none; color: white;
border-radius: 50%; width: 55px; height: 55px; font-size: 1.5rem; cursor: pointer;
transition: 0.3s; display:flex; justify-content:center; align-items:center;
box-shadow: 0 0 15px rgba(255,105,180,0.5);
}
.play-btn:hover { transform: scale(1.1); box-shadow: 0 0 25px rgba(255,105,180,0.8); }

/* Custom Range Slider */
.vol-container { display: flex; align-items: center; gap: 10px; font-size: 1.2rem; }
input[type=range] { -webkit-appearance: none; background: rgba(255,255,255,0.1); height: 6px; border-radius: 3px; outline: none; width: 100px; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #ff69b4; cursor: pointer; box-shadow: 0 0 10px #ff69b4; }

/* Sleep Timer */
.timer-container { display: flex; align-items: center; gap: 10px; font-family: 'Playfair Display', serif; font-size: 0.9rem; letter-spacing: 1px;}
.timer-select {
background: rgba(0,0,0,0.5); color: white; border: 1px solid rgba(255,105,180,0.4);
padding: 8px 15px; border-radius: 15px; outline: none; font-family: inherit; cursor: pointer; transition: 0.3s;
}
.timer-select:hover { border-color: #ff69b4; }
.timer-select option { background: #1a1a2e; color: white; }
#timerDisplayCountdown { color: #ff9ec4; font-weight: bold; width: 50px; text-align: right; }

/* ================= CELESTIAL BACKGROUND ================= */
canvas.bg-canvas{position:fixed;top:0;left:0;pointer-events:none;z-index:0;}
#stars{z-index: 1;}
#sunSvg, #moonSvg { position: absolute; transform: translate(-50%, -50%); z-index: 2; pointer-events: none; transition: opacity 0.5s ease; }
.particle { position:fixed; width:3px;height:3px;border-radius:50%;background:white;opacity:0.7; pointer-events:none; z-index:4; animation:glitterMove linear infinite; }
@keyframes glitterMove{ 0%{transform:translateY(0) rotate(0deg);opacity:0.7;} 50%{opacity:1;} 100%{transform:translateY(100vh) rotate(360deg);opacity:0;} }

footer{ position:absolute; bottom:15px; width:100%; text-align:center; z-index:20; color: rgba(255,255,255,0.5); font-size: 0.8rem; pointer-events: none;}

@media (max-width: 600px) {
.glass-controls { justify-content: center; }
.timer-container { width: 100%; justify-content: space-between; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }
}
</style>

<script>
// ================= YOUTUBE API LOGIC =================
let ytPlayer;
let sleepTimerInterval = null;
let countdownInterval = null;

// This function is automatically called by the YT API script once it loads
function onYouTubeIframeAPIReady() {
    ytPlayer = new YT.Player('ytplayer', {
        // rUxyKA_-grg is a popular 24/7 Lofi sleep/chill stream. Perfect for this vibe.
        videoId: 'rUxyKA_-grg', 
        playerVars: { 
            'autoplay': 0, 'controls': 0, 'disablekb': 1, 'fs': 0,
            'modestbranding': 1, 'rel': 0, 'playsinline': 1 
        },
        events: { 'onStateChange': onPlayerStateChange, 'onReady': onPlayerReady }
    });
}

function onPlayerReady(event) {
    ytPlayer.setVolume(40); // Default gentle volume
}

function onPlayerStateChange(event) {
    const playBtn = document.getElementById('ytPlayBtn');
    const wrapper = document.getElementById('ytWrapper');
    const subText = document.getElementById('sleepSubText');

    if (event.data == YT.PlayerState.PLAYING) {
        playBtn.innerText = '⏸️';
        wrapper.classList.add('playing');
        if(!sleepTimerInterval) subText.innerText = "Playing ambient sleep sounds... ✨";
    } else {
        playBtn.innerText = '▶️';
        wrapper.classList.remove('playing');
        subText.innerText = "Video paused. Rest well. 🌙";
    }
}

function toggleYTPlayer() {
    if(!ytPlayer || !ytPlayer.getPlayerState) return;
    if (ytPlayer.getPlayerState() == YT.PlayerState.PLAYING) {
        ytPlayer.pauseVideo();
    } else {
        ytPlayer.playVideo();
    }
}

function changeYTVolume(val) {
    if(ytPlayer && ytPlayer.setVolume) ytPlayer.setVolume(val);
}

function setSleepTimer(minutes) {
    clearInterval(sleepTimerInterval);
    clearInterval(countdownInterval);
    document.getElementById('timerDisplayCountdown').innerText = "";
    
    if(minutes == 0) {
        document.getElementById('sleepSubText').innerText = "Playing ambient sleep sounds... ✨";
        return;
    }
    
    let totalSeconds = minutes * 60;
    
    // UI Countdown
    countdownInterval = setInterval(() => {
        totalSeconds--;
        let m = Math.floor(totalSeconds / 60);
        let s = totalSeconds % 60;
        document.getElementById('timerDisplayCountdown').innerText = `${m}:${s.toString().padStart(2, '0')}`;
    }, 1000);

    document.getElementById('sleepSubText').innerText = `Music will softly fade out in ${minutes} minutes... ⏳`;
    
    // Fade out logic
    sleepTimerInterval = setTimeout(() => {
        clearInterval(countdownInterval);
        document.getElementById('timerDisplayCountdown').innerText = "";
        let vol = ytPlayer.getVolume();
        
        // Gentle fade over 5 seconds
        let fade = setInterval(() => {
            vol -= 2;
            if(vol <= 0) {
                clearInterval(fade);
                ytPlayer.pauseVideo();
                document.getElementById('sleepSubText').innerText = "Sleep tight, Anya. Goodnight 💖";
            } else {
                ytPlayer.setVolume(vol);
                document.getElementById('ytVolSlider').value = vol;
            }
        }, 200);
    }, minutes * 60000);
}

// ================= SKY DYNAMICS (SUNCALC) =================
const lat = 22.5726, lng = 88.3639; // Kolkata Coordinates
const starCanvas = document.getElementById("stars"), starCtx = starCanvas.getContext("2d");
let starsArr =[];

function resizeCanvases(){ starCanvas.width = innerWidth; starCanvas.height = innerHeight; initStars(); }
window.addEventListener("resize", resizeCanvases);

function initStars() {
// ================= STAR SYSTEM & SKY DYNAMICS =================
    starsArr = [];
    for (let i = 0; i < 250; i++) {
        starsArr.push({
            x: Math.random() * innerWidth,
            y: Math.random() * innerHeight,
            size: Math.random() * 1.5,
            opacity: Math.random(),
            blink: Math.random() * 0.02 + 0.005
        });
    }
}

function drawStars() {
    starCtx.clearRect(0, 0, starCanvas.width, starCanvas.height);
    starsArr.forEach(s => {
        s.opacity += s.blink;
        if (s.opacity > 1 || s.opacity < 0) s.blink *= -1;
        starCtx.fillStyle = `rgba(255, 255, 255, ${Math.max(0, s.opacity)})`;
        starCtx.beginPath();
        starCtx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
        starCtx.fill();
    });
}

function updateSky() {
    const now = new Date();
    const times = SunCalc.getTimes(now, lat, lng);
    const sunPos = SunCalc.getPosition(now, lat, lng);

    // Calculate screen coordinates based on Sun altitude/azimuth
    const sunX = (sunPos.azimuth / Math.PI + 1) * (innerWidth / 2);
    const sunY = (1 - (sunPos.altitude / (Math.PI / 2))) * (innerHeight / 2) + (innerHeight / 4);

    const sunSvg = document.getElementById("sunSvg");
    const moonSvg = document.getElementById("moonSvg");

    // Dynamic background based on sun altitude
    if (sunPos.altitude > 0) {
        // Daytime / Sunset
        let intensity = Math.min(sunPos.altitude * 2, 1);
        document.body.style.background = `linear-gradient(to bottom, #4a90e2, #f5a623)`;
        sunSvg.style.opacity = 1;
        moonSvg.style.opacity = 0;
        sunSvg.style.left = `${sunX}px`;
        sunSvg.style.top = `${sunY}px`;
    } else {
        // Nighttime
        document.body.style.background = `linear-gradient(to bottom, #050510, #1a1a2e, #16213e)`;
        sunSvg.style.opacity = 0;
        moonSvg.style.opacity = 1;
        
        // Position Moon opposite to where sun would be
        moonSvg.style.left = `${innerWidth - (sunX % innerWidth)}px`;
        moonSvg.style.top = `${Math.max(100, innerHeight - sunY)}px`;
    }
    
    // Moon Phase Shadow Logic
    const moonIllum = SunCalc.getMoonIllumination(now);
    const shadowOffset = 50 - (moonIllum.fraction * 50);
    document.getElementById("moonMaskShadow").setAttribute("cx", 30 + shadowOffset);
}

// ================= GLITTER PARTICLES =================
function createGlitter() {
    if (Math.random() > 0.1) return; // Limit frequency
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.top = '-10px';
    const size = Math.random() * 3 + 1 + 'px';
    p.style.width = size;
    p.style.height = size;
    p.style.animationDuration = (Math.random() * 3 + 2) + 's';
    p.style.background = `hsla(${Math.random() * 60 + 300}, 100%, 80%, 0.8)`; // Pinkish/Purple
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 5000);
}

// ================= MAIN ANIMATION LOOP =================
function animate() {
    drawStars();
    createGlitter();
    requestAnimationFrame(animate);
}

// Initialize
resizeCanvases();
updateSky();
animate();

// Update Sun/Moon position every minute
setInterval(updateSky, 60000);

// Helper for YouTube Loader
const tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
const firstScriptTag = document.getElementsByTagName('script')[0];
firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
</script>
