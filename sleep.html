<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dreamland | Our Magical Love 🌙</title>
<link rel="shortcut icon" href="https://raw.githubusercontent.com/LeTrollologist/anya.github.io/refs/heads/main/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
    --primary: #ff69b4;
    --accent: #7b61ff;
    --glass: rgba(10, 10, 25, 0.7);
    --border: rgba(255, 255, 255, 0.1);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
    overflow: hidden;
    height: 100vh;
    font-family: 'Inter', sans-serif;
    background: #05050a;
    color: white;
    display: flex;
    flex-direction: column;
}

/* Advanced Star Background */
#stars-container {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(circle at bottom, #1a1a2e 0%, #050510 100%);
    z-index: 0;
}

header {
    position: relative;
    z-index: 10;
    padding: 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
}

header span {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(1.8rem, 4vw, 2.5rem);
    color: var(--primary);
    text-shadow: 0 0 15px rgba(255, 105, 180, 0.5);
}

#navLinks { display: flex; gap: 20px; margin-top: 10px; }
header a {
    color: rgba(255, 255, 255, 0.5);
    text-decoration: none;
    font-size: 0.7rem;
    font-weight: bold;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: 0.3s;
}
header a:hover, header a.active-link {
    color: white;
    text-shadow: 0 0 10px var(--primary);
}

.sleep-container {
    position: relative;
    z-index: 5;
    margin: auto;
    width: 90%;
    max-width: 850px;
    text-align: center;
    perspective: 1000px;
}

.page-title {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(3.5rem, 10vw, 6rem);
    margin-bottom: 5px;
    background: linear-gradient(to bottom, #fff, var(--primary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.sub-title {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 1.1rem;
    opacity: 0.8;
    color: #ffd6f0;
    margin-bottom: 30px;
}

/* Glassmorphism Player */
.player-wrapper {
    position: relative;
    width: 100%;
    aspect-ratio: 16/9;
    border-radius: 24px;
    overflow: hidden;
    background: #000;
    border: 1px solid var(--border);
    box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 20px rgba(123, 97, 255, 0.1);
    transition: transform 0.5s cubic-bezier(0.2, 1, 0.3, 1);
}

.player-wrapper:hover {
    transform: scale(1.02);
}

.click-blocker {
    position: absolute;
    inset: 0;
    z-index: 10;
    background: linear-gradient(transparent 80%, rgba(0,0,0,0.4));
}

.glass-controls {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
    align-items: center;
    margin-top: 25px;
    background: var(--glass);
    padding: 20px 40px;
    border-radius: 50px;
    backdrop-filter: blur(15px);
    border: 1px solid var(--border);
}

.play-btn {
    background: white;
    border: none;
    color: black;
    border-radius: 50%;
    width: 60px; height: 60px;
    font-size: 1.2rem;
    cursor: pointer;
    transition: 0.3s;
    display: flex; align-items: center; justify-content: center;
}

.play-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px var(--primary);
}

input[type=range] {
    width: 120px;
    accent-color: var(--primary);
}

select {
    padding: 8px 15px;
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.1);
    color: white;
    border: 1px solid var(--border);
    outline: none;
    cursor: pointer;
}

#timerDisplayCountdown {
    font-family: 'monospace';
    font-size: 1.2rem;
    color: var(--primary);
    min-width: 60px;
}

footer {
    position: relative;
    z-index: 10;
    padding: 20px;
    text-align: center;
    color: rgba(255,255,255,0.3);
    font-size: 0.7rem;
    letter-spacing: 1px;
}

canvas { position: absolute; top: 0; left: 0; pointer-events: none; }
</style>
</head>
<body>

<div id="stars-container">
    <canvas id="stars"></canvas>
</div>

<header>
    <span>💖 Our Magical Love 💖</span>
    <div id="navLinks">
        <a href="index.html">Home</a>
        <a href="sleep.html" class="active-link">Sleep</a>
        <a href="https://overdefensively-unabjective-eilene.ngrok-free.dev/">Check In</a>
    </div>
</header>

<div class="sleep-container">
    <div class="page-title">Dreamland</div>
    <div class="sub-title" id="sleepSubText">Close your eyes and let the stars watch over you...</div>

    <div class="player-wrapper" id="ytWrapper">
        <div id="ytplayer"></div>
        <div class="click-blocker"></div>
    </div>

    <div class="glass-controls">
        <button class="play-btn" onclick="toggleYTPlayer()" id="ytPlayBtn">▶</button>
        
        <div style="display:flex; flex-direction:column; align-items:flex-start; gap:5px;">
            <span style="font-size:0.6rem; opacity:0.6; text-transform:uppercase;">Volume</span>
            <input type="range" id="ytVolSlider" min="0" max="100" value="40" oninput="changeYTVolume(this.value)">
        </div>

        <div style="display:flex; flex-direction:column; align-items:flex-start; gap:5px;">
            <span style="font-size:0.6rem; opacity:0.6; text-transform:uppercase;">Sleep Timer</span>
            <select id="sleepTimer" onchange="setSleepTimer(this.value)">
                <option value="0">Timer Off</option>
                <option value="30">30 min</option>
                <option value="60">1 hour</option>
                <option value="240">4 hour</option>
                <option value="480">8 hour</option>
                <option value="600">10 hour</option>
            </select>
        </div>
        
        <span id="timerDisplayCountdown"></span>
    </div>
</div>

<footer>© 2026 OUR MAGICAL LOVE • SLEEP MODULE V2.0</footer>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
let ytPlayer, timer=null, countdown=null;

function onYouTubeIframeAPIReady(){
    ytPlayer = new YT.Player('ytplayer', {
        height: '100%',
        width: '100%',
        videoId: 'Dfm2rB-nQ9Y',
        playerVars: { 
            controls: 0, 
            modestbranding: 1, 
            rel: 0, 
            autoplay: 0,
            loop: 1,
            playlist: 'Dfm2rB-nQ9Y'
        }
    });
}

function toggleYTPlayer(){
    if(!ytPlayer) return;
    const state = ytPlayer.getPlayerState();
    if(state === 1) {
        ytPlayer.pauseVideo();
        document.getElementById("ytPlayBtn").innerText = "▶";
    } else {
        ytPlayer.playVideo();
        document.getElementById("ytPlayBtn").innerText = "⏸";
    }
}

function changeYTVolume(val){
    if(ytPlayer) ytPlayer.setVolume(val);
}

function setSleepTimer(minutes){
    clearTimeout(timer); 
    clearInterval(countdown);
    document.getElementById("timerDisplayCountdown").innerText = "";
    if(minutes == 0) return;

    let seconds = minutes * 60;
    countdown = setInterval(() => {
        seconds--;
        let m = Math.floor(seconds / 60);
        let s = seconds % 60;
        document.getElementById("timerDisplayCountdown").innerText = 
            `${m}:${s.toString().padStart(2,'0')}`;
        if(seconds <= 0) clearInterval(countdown);
    }, 1000);

    timer = setTimeout(() => {
        let vol = ytPlayer.getVolume();
        let fade = setInterval(() => {
            vol -= 2;
            if(vol <= 0) { 
                clearInterval(fade); 
                ytPlayer.pauseVideo(); 
                ytPlayer.setVolume(40); // Reset for next session
                document.getElementById("ytPlayBtn").innerText = "▶";
            } else { 
                ytPlayer.setVolume(vol); 
                document.getElementById("ytVolSlider").value = vol;
            }
        }, 200);
    }, minutes * 60000);
}

/* ====== ADVANCED STARFIELD ENGINE ====== */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");
let stars = [];
let shootingStars = [];

function init() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    stars = [];
    for(let i=0; i<200; i++) {
        stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 1.5,
            opacity: Math.random(),
            speed: Math.random() * 0.2 + 0.05
        });
    }
}

function draw() {
    ctx.clearRect(0,0,canvas.width, canvas.height);
    
    // Draw Stars
    stars.forEach(s => {
        ctx.fillStyle = `rgba(255, 255, 255, ${s.opacity})`;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
        ctx.fill();
        
        // Parallax Movement
        s.y -= s.speed;
        if(s.y < 0) s.y = canvas.height;
        
        // Twinkle
        s.opacity += (Math.random() - 0.5) * 0.05;
        if(s.opacity > 1) s.opacity = 1;
        if(s.opacity < 0.1) s.opacity = 0.1;
    });

    // Shooting Stars
    if(Math.random() < 0.01) {
        shootingStars.push({
            x: Math.random() * canvas.width,
            y: 0,
            len: Math.random() * 80 + 20,
            speed: Math.random() * 10 + 5
        });
    }

    shootingStars.forEach((ss, i) => {
        ctx.strokeStyle = "rgba(255,255,255,0.5)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(ss.x, ss.y);
        ctx.lineTo(ss.x - ss.len, ss.y + ss.len);
        ctx.stroke();
        ss.x -= ss.speed;
        ss.y += ss.speed;
        if(ss.y > canvas.height) shootingStars.splice(i, 1);
    });

    requestAnimationFrame(draw);
}

window.onresize = init;
init();
draw();
</script>
</body>
</html>
