<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dreamland 🌙💖</title>
<link rel="shortcut icon" href="https://raw.githubusercontent.com/LeTrollologist/anya.github.io/refs/heads/main/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  overflow:hidden; height:100vh;
  font-family:'Playfair Display',serif;
  background: linear-gradient(to bottom, #050510, #1a1a2e, #16213e);
}
header{
  position:absolute; top:0; width:100%; padding:15px 20px;
  display:flex; flex-wrap:wrap; justify-content:center; gap:20px;
  z-index:10; font-family:'Great Vibes',cursive; font-size:clamp(1.5rem,3vw,2rem);
  color:white; text-shadow:0 0 5px black;
}
#navLinks{display:flex; gap:15px; flex-wrap:wrap;}
header a{
  color:rgba(255,255,255,0.8); text-decoration:none; font-weight:bold;
  font-size:clamp(.7rem,1.5vw,.9rem); transition:.3s;
  text-transform:uppercase; letter-spacing:1px;
}
header a:hover, header a.active-link{
  color:#ff69b4; text-shadow:0 0 10px rgba(255,105,180,.8);
}
.sleep-container{
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  display:flex; flex-direction:column; align-items:center; gap:20px;
  width:95%; max-width:750px; z-index:5;
  text-align:center; color:white;
}
.page-title{ font-family:'Great Vibes',cursive; font-size:clamp(3rem,8vw,4.5rem); }
.sub-title{ font-size:clamp(1rem,2.5vw,1.2rem); opacity:.9; color:#ffd6f0; }
canvas{position:fixed; top:0; left:0; width:100%; height:100%; z-index:0;}
.player-wrapper{
  position:relative; width:100%; aspect-ratio:16/9; border-radius:20px;
  overflow:hidden; background:#050510; border:1px solid rgba(255,255,255,.15);
  box-shadow:0 0 30px rgba(0,0,0,.8);
}
.click-blocker{position:absolute; inset:0; z-index:10;}
.glass-controls{
  display:flex; gap:20px; justify-content:center; align-items:center;
  margin-top:15px;
}
.play-btn{
  background:linear-gradient(145deg,#ff9ec4,#ff69b4); border:none;
  color:white; border-radius:50%; width:55px; height:55px; font-size:1.5rem;
  cursor:pointer;
}
input[type=range]{ width:120px; }
select{padding:5px 10px; border-radius:10px; outline:none;}
footer{ position:absolute; bottom:10px; width:100%; text-align:center; color:rgba(255,255,255,.5); font-size:.8rem; }
</style>
</head>
<body>

<header>
<span>💖 Our Magical Love 💖</span>
<div id="navLinks">
<a href="index.html">HOME</a>
<a href="sleep.html" class="active-link">SLEEP</a>
<a href="index.html">ALBUM</a>
<a href="index.html">CONTACT</a>
</div>
</br>
</header>

<canvas id="stars"></canvas>
</br>
<div class="sleep-container">
  <div class="page-title">Dreamland 🌙</div>
  <div class="sub-title" id="sleepSubText">Close your eyes and let the stars watch over you...</div>

  <div class="player-wrapper" id="ytWrapper">
    <div id="ytplayer"></div>
    <div class="click-blocker"></div>
  </div>

  <div class="glass-controls">
    <button class="play-btn" onclick="toggleYTPlayer()" id="ytPlayBtn">▶️</button>
    <input type="range" id="ytVolSlider" min="0" max="100" value="40" oninput="changeYTVolume(this.value)">
    <select id="sleepTimer" onchange="setSleepTimer(this.value)">
      <option value="0">Timer Off</option>
      <option value="30">30 min</option>
      <option value="60">1 hour</option>
      <option value="240">4 hour</option>
      <option value="480">8 hour</option>
      <option value="600">10 hour</option>
    </select>
    <span id="timerDisplayCountdown"></span>
  </div>
</div>

<footer>© 2026 Our Magical Love</footer>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
let ytPlayer, timer=null, countdown=null;

function onYouTubeIframeAPIReady(){
  ytPlayer=new YT.Player('ytplayer',{
    videoId:'Dfm2rB-nQ9Y',
    playerVars:{ controls:0, modestbranding:1, rel:0 }
  });
}

function toggleYTPlayer(){
  if(!ytPlayer)return;
  ytPlayer.getPlayerState()===1 ? ytPlayer.pauseVideo() : ytPlayer.playVideo();
}

function changeYTVolume(val){
  if(ytPlayer)ytPlayer.setVolume(val);
}

function setSleepTimer(minutes){
  clearTimeout(timer); clearInterval(countdown);
  document.getElementById("timerDisplayCountdown").innerText="";
  if(minutes==0)return;

  let seconds=minutes*60;
  countdown=setInterval(()=>{
    seconds--;
    let m=Math.floor(seconds/60), s=seconds%60;
    document.getElementById("timerDisplayCountdown").innerText=
      `${m}:${s.toString().padStart(2,'0')}`;
  },1000);

  timer=setTimeout(()=>{
    let vol=ytPlayer.getVolume();
    let fade=setInterval(()=>{
      vol-=2;
      if(vol<=0){ clearInterval(fade); ytPlayer.pauseVideo(); }
      else{ ytPlayer.setVolume(vol); document.getElementById("ytVolSlider").value=vol; }
    },200);
  },minutes*60000);
}

/* ====== STARS ====== */
const canvas=document.getElementById("stars"), ctx=canvas.getContext("2d");
let stars=[];
function resize(){
  canvas.width=innerWidth; canvas.height=innerHeight;
  stars=[];
  for(let i=0;i<150;i++){ stars.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,size:Math.random()*1.5}); }
}
window.onresize=resize; resize();
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  stars.forEach(s=>{ ctx.beginPath(); ctx.arc(s.x,s.y,s.size,0,Math.PI*2); ctx.fillStyle="white"; ctx.fill(); });
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
