<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💌 Check In 💌</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ===== GLOBAL ===== */
*{margin:0;padding:0;box-sizing:border-box;}
body{
    font-family:'Playfair Display',serif;
    background: linear-gradient(135deg, #0b0c17, #1a1b2e);
    color:white; height:100vh; display:flex; justify-content:center; align-items:center;
    overflow:hidden;
}
button{cursor:pointer; font-family:'Great Vibes',cursive; transition:0.3s;}

/* ===== CONTAINER ===== */
#checkin-container{
    text-align:center; padding:40px 30px; border-radius:25px; background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px); box-shadow:0 10px 40px rgba(255,105,180,0.3);
    max-width:400px; width:90%;
}
#checkin-container h1{
    font-family:'Great Vibes',cursive; font-size:3rem; margin-bottom:20px; color:#ff69b4;
    text-shadow:0 0 10px #ffb6c1;
}
#checkin-container p{
    font-size:1rem; opacity:0.8; margin-bottom:30px;
}

/* ===== BUTTONS ===== */
.checkin-btn{
    display:block; width:100%; margin:10px 0; padding:15px 20px;
    font-size:1.4rem; border:none; border-radius:20px; background: linear-gradient(145deg, #ff9ec4, #ff69b4);
    color:white; box-shadow:0 5px 20px rgba(255,105,180,0.5); transition:0.2s;
}
.checkin-btn:hover{
    transform: scale(1.05);
    box-shadow:0 10px 30px rgba(255,105,180,0.7);
}

/* ===== FEEDBACK ===== */
#feedback{
    margin-top:20px; font-family:'Great Vibes',cursive; font-size:1.5rem; color:#ffb6c1;
    min-height:2rem;
    animation:fadeText 0.5s ease-in-out;
}
@keyframes fadeText{
    0%{opacity:0;}
    100%{opacity:1;}
}

/* ===== FLOATING HEARTS ===== */
.heart{
    position: absolute;
    width: 20px;
    height: 20px;
    background: #ff69b4;
    transform: rotate(-45deg);
    animation: floatUp 6s linear infinite;
    border-radius: 5px 5px 0 0;
}
.heart::before,
.heart::after{
    content: "";
    position: absolute;
    width: 20px;
    height: 20px;
    background: #ff69b4;
    border-radius: 50%;
}
.heart::before{top:-10px; left:0;}
.heart::after{left:10px; top:0;}
@keyframes floatUp{
    0%{transform: translateY(0) rotate(-45deg); opacity:1;}
    100%{transform: translateY(-500px) rotate(-45deg); opacity:0;}
}
</style>
</head>
<body>

<div id="checkin-container">
    <h1>💌 Send Your Love 💌</h1>
    <p>Check in and send a little love to Discord 💖</p>

    <button class="checkin-btn" onclick="sendCheckIn('anya')">Anya 💖</button>
    <button class="checkin-btn" onclick="sendCheckIn('micheal')">Micheal 💌</button>
    <button class="checkin-btn" onclick="sendCheckIn('guest')">Guest 🌸</button>
    <a href="index.html"><button class="checkin-btn">Return to Love 💖</button></a>
    <div id="feedback"></div>
</div>

<script>
// ===== LOVING MESSAGES =====
const messages = {
    anya: [
        "I love you mostest times infinity times perpetuity 💖",
        "I love you more than chocos 🍫💕",
        "You are my sunshine on rainy days ☀️🌧️",
        "I adore you endlessly 💞",
        "You make my heart skip beats ❤️",
        "Forever and always, my love 💓",
        "Every moment with you is magical ✨",
        "You’re my favorite human in the universe 🌌💖",
        "I love you to the moon and back, and then some 🌙💗",
        "You are my everything, my heart, my soul 💖"
    ],
    micheal: [
        "Micheal checked in with love 💌",
        "Micheal says: I adore you, Anya 💖",
        "Micheal is sending warm thoughts 🌹"
    ],
    guest: [
        "A guest paid their respects 🌸",
        "Someone sent love to Anya 💖",
        "Your kindness is felt 💕"
    ]
};

// ===== SEND CHECK-IN =====
async function sendCheckIn(type){
    const feedback = document.getElementById('feedback');
    let randomMsg = messages[type][Math.floor(Math.random()*messages[type].length)];
    
    feedback.textContent = "Sending your love... 💌";
    
    try {
        const response = await fetch('https://your-server.com/checkin', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({type:type, message: randomMsg})
        });
        if(response.ok){
            feedback.textContent = randomMsg;
        } else {
            feedback.textContent = "Oops! Something went wrong 💔";
        }
    } catch(err){
        feedback.textContent = "Couldn't reach the server 💔";
        console.error(err);
    }

    // Floating heart animation
    createHeart();
}

// ===== FLOATING HEARTS =====
function createHeart(){
    const heart = document.createElement('div');
    heart.className = 'heart';
    heart.style.left = Math.random() * window.innerWidth + 'px';
    heart.style.width = heart.style.height = 15 + Math.random() * 20 + 'px';
    document.body.appendChild(heart);
    setTimeout(()=>{heart.remove()},6000);
}
</script>

</body>
</html>
