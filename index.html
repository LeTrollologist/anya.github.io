<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Anya 💖</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{overflow:hidden;height:100vh;font-family:'Playfair Display',serif;transition:background 1s linear;}
body::after{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(circle at center,transparent 60%,rgba(0,0,0,0.8));}

/* Header */
header{position:absolute;top:0;width:100%;padding:10px 20px;display:flex;justify-content:center;align-items:center;gap:20px;z-index:50;font-family:'Great Vibes',cursive;font-size:clamp(1rem,2vw,1.5rem);color:white;text-shadow:0 0 5px black;}
header a{color:white;text-decoration:none;font-family:'Playfair Display',serif;font-weight:bold;transition:0.3s;}
header a:hover{color:#ff69b4;cursor:pointer;}

/* Text */
.love-text{position:absolute;width:100%;text-align:center;top:30%;font-family:'Great Vibes',cursive;font-size:clamp(2.5rem,6vw,5rem);animation:floatText 6s ease-in-out infinite, heartbeatVisual 1.8s infinite;text-shadow:0 0 25px rgba(255,255,255,0.9);z-index:10;}
@keyframes floatText{50%{transform:translateY(-15px);}}
@keyframes heartbeatVisual{50%{transform:scale(1.05);}}

/* Counters */
.counter{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;font-size:clamp(1rem,3vw,2rem);z-index:10;font-family:'Great Vibes',cursive;}
footer{position:absolute;bottom:10px;width:100%;text-align:center;font-size:clamp(0.8rem,2vw,1rem);z-index:10;font-family:'Playfair Display',serif;color:white;text-shadow:0 0 10px black;transition:all 0.3s ease;}

/* Letter */
.letter{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:90%;max-width:500px;background:#fffef8;color:#333;padding:30px;border-radius:10px;display:none;opacity:0;font-family:cursive;z-index:20;pointer-events:all;transition:opacity 1s ease;}
.letter.show{display:block;opacity:1;}

/* Proposal */
.marry{position:absolute;inset:0;background:rgba(0,0,0,0.5);display:none;flex-direction:column;align-items:center;justify-content:center;font-family:'Great Vibes',cursive;font-size:clamp(2rem,6vw,4rem);opacity:0;z-index:30;pointer-events:all;backdrop-filter: blur(5px);transition:opacity 1s ease;}
#proposalText{text-align:center;color:white;text-shadow:0 0 10px #ffddaa,0 0 20px #ffbb88,0 0 30px #ff9966;margin-bottom:30px;}
.marry p{font-size:1.5rem;text-align:center;margin-top:20px;}

/* Proposal Buttons */
.marry button {
    background: linear-gradient(145deg, #ff9ec4, #ff69b4);
    border: none;
    border-radius: 25px;
    padding: 12px 30px;
    margin: 0 10px;
    color: white;
    font-family: 'Great Vibes', cursive;
    font-size: clamp(1rem, 2vw, 1.5rem);
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(255,105,180,0.6);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}
.marry button:hover {
    transform: scale(1.1);
    box-shadow: 0 6px 25px rgba(255,105,180,0.8);
}
.marry button:focus {outline:none;}

/* Ending */
.ending{position:absolute;inset:0;background:white;color:black;display:flex;align-items:center;justify-content:center;font-family:'Great Vibes',cursive;font-size:clamp(2rem,7vw,5rem);opacity:0;pointer-events:none;transition:3s;z-index:40;text-shadow:0 0 20px #ff69b4,0 0 40px #ffb6c1;text-align:center;line-height:1.5;}

/* Petals + Glitter */
.petal,.glitter{position:absolute;width:15px;height:15px;background:radial-gradient(circle at 30% 30%,pink,#ff69b4);border-radius:50% 50% 50% 0;animation:fall linear infinite;pointer-events:none;z-index:5;}
@keyframes fall{to{transform:translateY(110vh) rotate(360deg);}}
.glitter{width:3px;height:3px;border-radius:50%;background:white;opacity:0.7;animation:glitterMove linear infinite;z-index:4;}
@keyframes glitterMove{0%{transform:translateY(0) rotate(0deg);opacity:0.7;}50%{opacity:1;}100%{transform:translateY(100vh) rotate(360deg);opacity:0;}}

/* Canvas */
canvas{position:absolute;top:0;left:0;pointer-events:none;}
#moon,#sun{position:absolute;top:0;left:0;pointer-events:none;z-index:6;}
</style>
</head>
<body>
<header>
  💖 Our Magical Love 💖
  <a href="https://letrollologist.github.io/anya.github.io/">HOME</a>
  <span id="headerProposal" style="cursor:pointer;">💍</span>
  <a href="https://letrollologist.github.io/anya.github.io/album.html">ALBUM</a>
  <a href="https://letrollologist.github.io/anya.github.io/log.html">LOG</a>
  <a href="https://letrollologist.github.io/anya.github.io/status.html">STATUS</a>
</header>

<canvas id="stars"></canvas>
<canvas id="sun"></canvas>
<canvas id="moon"></canvas>

<div class="love-text">I love you Anya</div>
<div class="counter" id="counter"></div>
<div class="letter" id="letter"></div>

<div class="marry" id="marry">
    <div class="ring"></div>
    <div id="proposalText"></div>
    <div>
        <button class="yes" onclick="sayYes()">Yes</button>
        <button class="no" onclick="sayNo()">No</button>
    </div>
    <p>Disclaimer: This isn’t a real proposal 💖 I wish it were, but this is a glimpse into <em>our</em> future.</p>
</div>

<div class="ending" id="ending"></div>
<footer id="footerCounter"></footer>
<div class="footer-meta">
  <p>© 2026 Our Magical Love. All rights reserved.</p>
  <a href="privacy.html" target="_blank" style="color:white; text-decoration:underline;">Privacy Policy</a>
</div>

<!-- SunCalc -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>
<script>
// Coordinates for Anya (Kolkata)
const lat = 22.5726, lng = 88.3639;

// CANVASES
const sunCanvas = document.getElementById("sun"), sunCtx = sunCanvas.getContext("2d"),
      moonCanvas = document.getElementById("moon"), moonCtx = moonCanvas.getContext("2d");

function resizeCanvases(){
    sunCanvas.width = moonCanvas.width = innerWidth;
    sunCanvas.height = moonCanvas.height = innerHeight;
}
resizeCanvases();
window.addEventListener("resize", resizeCanvases);

// Background gradient based on sun altitude
function updateBackground(sunAlt){
    const t = Math.max(0, Math.min(1, (sunAlt + Math.PI/2)/Math.PI));
    const dayColor = `rgb(${25+205*t},${50+130*t},${80+175*t})`;
    const nightColor = `rgb(15,25,50)`;
    document.body.style.background = `linear-gradient(to bottom, ${dayColor}, ${nightColor})`;
}

// Draw sky
function drawSky(){
    const now = new Date();

    // Sun
    const sunPos = SunCalc.getPosition(now, lat, lng);
    const sunAlt = sunPos.altitude, sunAz = sunPos.azimuth;
    updateBackground(sunAlt);

    sunCtx.clearRect(0,0,innerWidth,innerHeight);
    if(sunAlt > -0.1){
        const sx = (sunAz + Math.PI)/(2*Math.PI)*innerWidth;
        const sy = innerHeight * (1 - (sunAlt + Math.PI/2)/Math.PI);
        const glow = Math.max(0, Math.sin(sunAlt) * 0.8);
        sunCtx.beginPath();
        sunCtx.fillStyle = `rgba(255,240,150,${glow})`;
        sunCtx.arc(sx, sy, 80, 0, Math.PI*2);
        sunCtx.fill();
        sunCtx.beginPath();
        sunCtx.fillStyle = "yellow";
        sunCtx.arc(sx, sy, 30, 0, Math.PI*2);
        sunCtx.fill();
    }

    // Moon
    const moonPos = SunCalc.getMoonPosition(now, lat, lng);
    const moonIll = SunCalc.getMoonIllumination(now);
    const moonAlt = moonPos.altitude;
    moonCtx.clearRect(0,0,innerWidth,innerHeight);
    if(moonAlt > -0.1){
        const mx = (moonPos.azimuth + Math.PI)/(2*Math.PI)*innerWidth;
        const my = innerHeight*(1 - (moonAlt + Math.PI/2)/Math.PI);
        const fraction = moonIll.fraction;
        moonCtx.beginPath();
        moonCtx.fillStyle = "#ddd";
        moonCtx.arc(mx, my, 25, 0, Math.PI*2);
        moonCtx.fill();
        moonCtx.globalCompositeOperation = "destination-out";
        moonCtx.beginPath();
        const shift = 25*(1 - fraction);
        moonCtx.ellipse(mx + (fraction>0.5 ? shift : -shift), my, 25, 25, 0, 0, Math.PI*2);
        moonCtx.fill();
        moonCtx.globalCompositeOperation = "source-over";
    }

    requestAnimationFrame(drawSky);
}
drawSky();

// Days counter
const startDate = new Date("2026-02-17T16:19:00+05:30");
const counterEl = document.getElementById("counter");
function updateCounter(){
    const diff=new Date()-startDate;
    const d=Math.floor(diff/86400000),h=Math.floor(diff/3600000%24),m=Math.floor(diff/60000%60),s=Math.floor(diff/1000%60);
    counterEl.innerHTML=`<span>${d} 💖 Days</span> <span>${h} 🕒 Hours</span> <span>${m} ⏳ Minutes</span> <span>${s} 💌 Seconds</span>`;
}
setInterval(updateCounter,1000);

// Footer visits
let visits = localStorage.getItem("anya_visits")||0;
visits++;
localStorage.setItem("anya_visits",visits);
const footer = document.getElementById("footerCounter");
footer.innerHTML=`You’ve visited ${visits} times 🌸`;
footer.style.transform="scale(1.2)";
setTimeout(()=>{footer.style.transform="scale(1)";},300);

// Petals
for(let i=0;i<40;i++){
    let p=document.createElement("div");p.className="petal";
    p.style.left=Math.random()*100+"vw";
    p.style.animationDuration=(5+Math.random()*5)+"s";
    p.style.animationTimingFunction=["linear","ease-in","ease-out"][Math.floor(Math.random()*3)];
    p.style.transform=`rotate(${Math.random()*360}deg)`;
    document.body.appendChild(p);
}

// Glitter
for(let i=0;i<40;i++){
    let g=document.createElement("div");g.className="glitter";
    g.style.left=Math.random()*100+"vw";
    g.style.animationDuration=(5+Math.random()*5)+"s";
    document.body.appendChild(g);
}

// 3-click letter
let clickCount=0,iChar=0;
const letter=document.getElementById("letter");
const letterText="You are written in my sky and in every future I see.";
function writeLetter(){if(iChar<letterText.length){letter.innerHTML+=letterText.charAt(iChar);iChar++;setTimeout(writeLetter,50);}}
document.body.addEventListener("click",()=>{clickCount++;if(clickCount>=3 && !letter.classList.contains('show')){letter.classList.add('show');writeLetter();}});

// Proposal
const headerProposal = document.getElementById("headerProposal");
let proposalClockInterval;

function updateProposalClocks(){
    const proposalText = document.getElementById("proposalText");
    const now = new Date();
    const istString = now.toLocaleTimeString('en-IN', {timeZone:'Asia/Kolkata', hour12:true});
    const deviceString = now.toLocaleTimeString();
    proposalText.innerHTML=`IST: ${istString}<br>Device: ${deviceString}`;
}

headerProposal.addEventListener("click",(e)=>{
    e.stopPropagation();
    const marry=document.getElementById("marry");
    updateProposalClocks();
    proposalClockInterval=setInterval(updateProposalClocks,1000);
    marry.style.display="flex";
    setTimeout(()=>{marry.style.opacity=1;},10);
});

// Proposal YES/NO
function sayYes(){
    clearInterval(proposalClockInterval);
    const marry=document.getElementById("marry"); 
    marry.style.opacity=0;
    setTimeout(()=>{marry.style.display="none";},1000);
    const ending=document.getElementById("ending");
    const today=new Date(); const options={year:'numeric',month:'long',day:'numeric'};
    ending.innerHTML=`Forever begins now ♡<br>${today.toLocaleDateString(undefined,options)}`;
    ending.style.opacity=1; ending.style.pointerEvents="auto";
}
function sayNo(){
    document.querySelector(".no").style.opacity=0;
    setTimeout(()=>{alert("I’ll keep asking forever 💖");},500);
}

// Stop propagation
[letter,document.getElementById("marry"),headerProposal].forEach(el=>el.addEventListener("click",e=>e.stopPropagation()));
</script>
</body>
</html>
