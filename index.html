<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>29 Days</title>
<!-- SunCalc for Moon/Sun tracking -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>

<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: #01060f; /* Pitch dark blue base */
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    overflow: hidden;
    perspective: 1000px; /* Needed for the 3D interaction */
  }

  /* Sun and Moon positioning */
  #sunSvg, #moonSvg {
    position: fixed;
    transform: translate(-50%, -50%);
    z-index: 2; /* Sits behind the fluid blurs and glass card */
    pointer-events: none;
    transition: opacity 0.8s;
  }

  /* Abstract Fluid Background */
  .fluid-bg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    z-index: 3; /* Blurs the sun/moon slightly if they pass behind */
    filter: blur(90px); 
    pointer-events: none;
  }

  .blob {
    position: absolute;
    border-radius: 50%;
    animation: float 25s infinite ease-in-out alternate;
  }

  .blob1 {
    width: 60vw;
    height: 60vw;
    background: rgba(8, 33, 69, 0.8);
    top: -10%;
    left: -10%;
    animation-duration: 25s;
  }

  .blob2 {
    width: 50vw;
    height: 50vw;
    background: rgba(4, 18, 36, 0.8);
    bottom: -20%;
    right: -10%;
    animation-duration: 28s;
    animation-direction: alternate-reverse;
  }

  .blob3 {
    width: 45vw;
    height: 45vw;
    background: rgba(13, 50, 107, 0.6);
    top: 30%;
    left: 20%;
    animation-duration: 22s;
    mix-blend-mode: lighten;
  }

  @keyframes float {
    0% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(10vw, -10vh) scale(1.1); }
    66% { transform: translate(-5vw, 15vh) scale(0.9); }
    100% { transform: translate(0, 0) scale(1); }
  }

  /* Glass Card */
  .card-wrapper {
    z-index: 10;
    transform-style: preserve-3d;
  }

  .container {
    text-align: center;
    backdrop-filter: blur(16px) saturate(120%);
    -webkit-backdrop-filter: blur(16px) saturate(120%);
    background: rgba(8, 20, 38, 0.4);
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-top: 1px solid rgba(255, 255, 255, 0.1);
    border-left: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 24px;
    padding: 80px 50px;
    box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5);
    color: #cbd5e1;
    transform: translateZ(30px);
    transition: transform 0.1s ease-out;
  }

  /* Typography */
  .number {
    font-size: 7rem;
    font-weight: 200;
    letter-spacing: -2px;
    margin: 0;
    line-height: 1;
    color: #8da9c4;
    text-shadow: 0 0 20px rgba(141, 169, 196, 0.2);
  }

  .label {
    font-size: 1rem;
    font-weight: 300;
    letter-spacing: 8px;
    text-transform: uppercase;
    margin-top: 10px;
    margin-bottom: 40px;
    color: #4b6b8c;
  }

  .quote {
    font-size: 1.1rem;
    font-weight: 300;
    font-style: italic;
    max-width: 350px;
    margin: 0 auto;
    color: #728ca6;
    line-height: 1.6;
    opacity: 0.6;
    transition: opacity 0.8s ease, text-shadow 0.8s ease;
    cursor: default;
  }

  .container:hover .quote {
    opacity: 1;
    text-shadow: 0 0 10px rgba(114, 140, 166, 0.3);
  }
</style>
</head>
<body>

  <!-- Sun & Moon SVGs -->
  <svg id="sunSvg" width="128" height="128">
    <circle id="sunGlowLayer" cx="64" cy="64" r="64" fill="rgba(255,240,150,.42)"/>
    <circle cx="64" cy="64" r="23" fill="yellow"/>
  </svg>
  <svg id="moonSvg" width="50" height="50">
    <defs><mask id="moonMask"><rect width="50" height="50" fill="white"/><circle id="moonShadow" cx="25" cy="25" r="21" fill="black"/></mask></defs>
    <circle cx="25" cy="25" r="19" fill="#dde" mask="url(#moonMask)"/>
    <circle cx="25" cy="25" r="19" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="1"/>
  </svg>

  <!-- Abstract Liquid Background -->
  <div class="fluid-bg">
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>
  </div>

  <!-- Interactive Glass Card -->
  <div class="card-wrapper" id="card">
    <div class="container">
      <h1 class="number">29</h1>
      <div class="label">Days</div>
      <div class="quote">Some hearts care enough to love, but not enough to stay; and that doesn’t make the love any less real. </br>Goodbye.</div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // 1. Sentinel Analytics Uplink
      (function(){
        var SENTINEL_URL = 'https://analytics-server-bdrm.onrender.com/log';
        var sessionId = sessionStorage.getItem('_sid');
        if (!sessionId) {
          sessionId = Math.random().toString(36).slice(2) + Date.now().toString(36);
          sessionStorage.setItem('_sid', sessionId);
        }
        fetch(SENTINEL_URL, {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({
            ua:navigator.userAgent,
            page:window.location.pathname||'/',
            screen:window.innerWidth+'x'+window.innerHeight,
            referrer:document.referrer||'',
            sessionId:sessionId
          }),
          keepalive:true
        }).catch(function(){});
      })();

      // 2. Sun & Moon Logic (Original Coordinates: 22.5726, 88.3639)
      var LAT = 22.5726, LNG = 88.3639;
      function drawSky() {
        var now = new Date();
        var sp = SunCalc.getPosition(now, LAT, LNG);
        var sun  = document.getElementById('sunSvg');
        var moon = document.getElementById('moonSvg');

        // Sun positioning
        if (sp.altitude > -.1) {
          sun.style.left = ((sp.azimuth+Math.PI)/(2*Math.PI)*window.innerWidth) + 'px';
          sun.style.top  = (window.innerHeight*(1-(sp.altitude+Math.PI/2)/Math.PI)) + 'px';
          sun.style.display = 'block';
          document.getElementById('sunGlowLayer').setAttribute('fill',
            'rgba(255,240,150,'+Math.max(0,Math.sin(sp.altitude)*.8)+')');
        } else { 
          sun.style.display = 'none'; 
        }

        // Moon positioning
        var mp = SunCalc.getMoonPosition(now, LAT, LNG);
        var mil = SunCalc.getMoonIllumination(now);
        if (mp.altitude > -.1) {
          moon.style.left = ((mp.azimuth+Math.PI)/(2*Math.PI)*window.innerWidth) + 'px';
          moon.style.top  = (window.innerHeight*(1-(mp.altitude+Math.PI/2)/Math.PI)) + 'px';
          moon.style.display = 'block';
          var sh = 50*mil.fraction;
          document.getElementById('moonShadow').setAttribute('cx', mil.phase<=.5 ? 25-sh : 25+sh);
        } else { 
          moon.style.display = 'none'; 
        }

        requestAnimationFrame(drawSky);
      }
      // Start the sky loop
      if (typeof SunCalc !== 'undefined') {
        drawSky();
      }

      // 3. Subtle 3D Tilt Interaction
      const card = document.getElementById('card');
      
      document.addEventListener('mousemove', (e) => {
        let xAxis = (window.innerWidth / 2 - e.pageX) / 40;
        let yAxis = (window.innerHeight / 2 - e.pageY) / 40;
        
        card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
      });

      // Reset rotation when mouse leaves the screen
      document.addEventListener('mouseleave', () => {
        card.style.transition = 'transform 0.5s ease';
        card.style.transform = `rotateY(0deg) rotateX(0deg)`;
        
        setTimeout(() => {
          card.style.transition = 'none';
        }, 500);
      });
    });
  </script>

</body>
</html>
