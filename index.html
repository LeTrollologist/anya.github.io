<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Anya 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
overflow:hidden;
height:100vh;
font-family:'Playfair Display',serif;
transition:background 1s;
}

body::after{
content:'';
position:fixed;
inset:0;
pointer-events:none;
background:radial-gradient(circle at center,transparent 60%,rgba(0,0,0,0.8));
}

/* HEADER */

header{
position:absolute;
top:0;
width:100%;
padding:10px 20px;
display:flex;
justify-content:center;
align-items:center;
gap:20px;
z-index:50;
font-family:'Great Vibes',cursive;
font-size:clamp(1rem,2vw,1.5rem);
color:white;
text-shadow:0 0 5px black;
}

header a{
color:white;
text-decoration:none;
font-family:'Playfair Display',serif;
font-weight:bold;
}

header a:hover{
color:#ff69b4;
}

/* STUDY TOGGLE */

#studyToggle{
cursor:pointer;
font-size:1.2rem;
}

/* LOVE TEXT */

.love-text{
position:absolute;
width:100%;
text-align:center;
top:30%;
font-family:'Great Vibes',cursive;
font-size:clamp(2.5rem,6vw,5rem);
animation:floatText 6s ease-in-out infinite;
text-shadow:0 0 25px rgba(255,255,255,0.9);
z-index:10;
}

@keyframes floatText{
50%{transform:translateY(-15px);}
}

/* COUNTER */

.counter{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
font-size:clamp(1rem,3vw,2rem);
z-index:10;
font-family:'Great Vibes',cursive;
}

/* LETTER */

.letter{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:90%;
max-width:500px;
background:#fffef8;
color:#333;
padding:30px;
border-radius:10px;
display:none;
opacity:0;
z-index:20;
transition:opacity 1s;
}

.letter.show{
display:block;
opacity:1;
}

/* PROPOSAL */

.marry{
position:absolute;
inset:0;
background:rgba(0,0,0,0.5);
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
opacity:0;
z-index:30;
backdrop-filter:blur(5px);
transition:opacity 1s;
}

#proposalText{
text-align:center;
color:white;
margin-bottom:30px;
}

.marry button{
background:linear-gradient(145deg,#ff9ec4,#ff69b4);
border:none;
border-radius:25px;
padding:12px 30px;
margin:10px;
color:white;
font-family:'Great Vibes',cursive;
font-size:1.4rem;
cursor:pointer;
}

/* ENDING */

.ending{
position:absolute;
inset:0;
background:white;
display:flex;
align-items:center;
justify-content:center;
font-family:'Great Vibes',cursive;
font-size:clamp(2rem,7vw,5rem);
opacity:0;
transition:3s;
z-index:40;
}

/* PETALS */

.petal{
position:absolute;
width:15px;
height:15px;
background:pink;
border-radius:50%;
animation:fall linear infinite;
pointer-events:none;
}

@keyframes fall{
to{transform:translateY(110vh);}
}

/* GLITTER */

.glitter{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
animation:fall linear infinite;
pointer-events:none;
}

/* STUDY MODE */

body.studyMode{
background:linear-gradient(to bottom,#050814,#0f1b2b,#1a2545);
}

body.studyMode .love-text,
body.studyMode .petal,
body.studyMode .glitter,
body.studyMode #headerProposal{
display:none;
}

/* STUDY PANEL */

#studyPanel{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
display:none;
color:white;
z-index:20;
}

#studyPanel h2{
font-family:'Great Vibes',cursive;
font-size:3rem;
margin-bottom:10px;
}

#timerDisplay{
font-size:3rem;
margin:15px;
}

.studyButtons button{
margin:5px;
padding:10px 20px;
border:none;
border-radius:20px;
background:#6a7cff;
color:white;
cursor:pointer;
}

#motivation{
margin-top:15px;
font-size:1.2rem;
opacity:.9;
}

/* FOOTER */

footer{
position:absolute;
bottom:0;
width:100%;
text-align:center;
color:white;
font-size:.9rem;
}

</style>
</head>

<body>

<header id="siteTitle">

💖 Our Magical Love 💖

<a href="#">HOME</a>

<span id="headerProposal">💍</span>

<a href="#">ALBUM</a>

<a href="#">LOG</a>

<a href="#">MINIGAME</a>

<span id="studyToggle">📚</span>

</header>

<canvas id="stars"></canvas>

<div class="love-text">I love you Anya</div>

<div class="counter" id="counter"></div>

<div class="letter" id="letter"></div>

<!-- PROPOSAL -->

<div class="marry" id="marry">

<div id="proposalText"></div>

<button onclick="sayYes()">Yes</button>
<button onclick="sayNo()">No</button>

<p style="color:white;">Disclaimer: This isn't a real proposal 💖</p>

</div>

<div class="ending" id="ending"></div>

<!-- STUDY MODE -->

<div id="studyPanel">

<h2>📚 StudyBuddy</h2>

<div>

<input id="focusMinutes" type="number" value="25" min="1" style="width:80px;padding:5px;border-radius:10px;border:none;text-align:center;">

minutes focus

</div>

<div id="timerDisplay">25:00</div>

<div class="studyButtons">

<button onclick="startTimer()">Start</button>
<button onclick="pauseTimer()">Pause</button>
<button onclick="resetTimer()">Reset</button>

</div>

<div id="motivation">

Stay focused. Small steps create big futures.

</div>

</div>

<footer>

<div id="footerCounter"></div>

<p>© 2026 Our Magical Love</p>

</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>

<script>

/* LOVE COUNTER */

const startDate=new Date("2026-02-17T16:19:00+05:30")

setInterval(()=>{

const diff=new Date()-startDate

const d=Math.floor(diff/86400000)

const h=Math.floor(diff/3600000%24)

const m=Math.floor(diff/60000%60)

const s=Math.floor(diff/1000%60)

document.getElementById("counter").innerHTML=
`${d} 💖 Days ${h}h ${m}m ${s}s`

},1000)

/* VISIT COUNTER */

let visits=localStorage.getItem("anya_visits")||0
visits++
localStorage.setItem("anya_visits",visits)

document.getElementById("footerCounter").innerHTML=
`You've visited ${visits} times 🌸`

/* PETALS */

for(let i=0;i<40;i++){
let p=document.createElement("div")
p.className="petal"
p.style.left=Math.random()*100+"vw"
p.style.animationDuration=(5+Math.random()*5)+"s"
document.body.appendChild(p)
}

/* GLITTER */

for(let i=0;i<40;i++){
let g=document.createElement("div")
g.className="glitter"
g.style.left=Math.random()*100+"vw"
g.style.animationDuration=(5+Math.random()*5)+"s"
document.body.appendChild(g)
}

/* LETTER */

let clickCount=0

document.body.addEventListener("click",()=>{

clickCount++

if(clickCount>=3){

const letter=document.getElementById("letter")

letter.classList.add("show")

letter.innerHTML="You are written in my sky and every future I see."

}

})

/* PROPOSAL */

document.getElementById("headerProposal").onclick=()=>{

const marry=document.getElementById("marry")

marry.style.display="flex"

setTimeout(()=>marry.style.opacity=1,10)

}

function sayYes(){

document.getElementById("ending").innerHTML="Forever begins now ♡"

document.getElementById("ending").style.opacity=1

}

function sayNo(){

alert("I'll keep asking forever 💖")

}

/* STUDY MODE */

let studyMode=false

document.getElementById("studyToggle").onclick=()=>{

studyMode=!studyMode

document.body.classList.toggle("studyMode")

document.getElementById("studyPanel").style.display=studyMode?"block":"none"

document.getElementById("siteTitle").innerHTML=studyMode?

"📚 StudyBuddy":

"💖 Our Magical Love 💖"

}

/* TIMER */

let timerInterval
let remainingSeconds

function startTimer(){

const minutes=document.getElementById("focusMinutes").value

remainingSeconds=minutes*60

timerInterval=setInterval(updateTimer,1000)

}

function pauseTimer(){

clearInterval(timerInterval)

}

function resetTimer(){

clearInterval(timerInterval)

remainingSeconds=document.getElementById("focusMinutes").value*60

updateDisplay()

}

function updateTimer(){

remainingSeconds--

updateDisplay()

if(remainingSeconds<=0){

clearInterval(timerInterval)

document.getElementById("motivation").innerText="Great work. Take a break ☕"

}

}

function updateDisplay(){

let m=Math.floor(remainingSeconds/60)

let s=remainingSeconds%60

document.getElementById("timerDisplay").innerText=

`${m}:${s.toString().padStart(2,'0')}`

}

/* MOTIVATION */

const messages=[

"Focus now, freedom later.",

"Every minute counts.",

"Your future self is proud.",

"Stay steady. Stay calm.",

"Progress is happening."

]

setInterval(()=>{

document.getElementById("motivation").innerText=

messages[Math.floor(Math.random()*messages.length)]

},20000)

</script>

</body>
</html>
