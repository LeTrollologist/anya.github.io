<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Anya 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
    overflow:hidden;
    height:100vh;
    font-family:'Playfair Display',serif;
    transition:background 2s linear;
}

/* Cinematic vignette */
body::after{
    content:'';
    position:fixed;
    inset:0;
    pointer-events:none;
    background:radial-gradient(circle at center,transparent 60%,rgba(0,0,0,0.8));
}

/* Text */
.love-text{
    position:absolute;
    width:100%;
    text-align:center;
    top:35%;
    font-family:'Great Vibes',cursive;
    font-size:clamp(2.5rem,6vw,5rem);
    animation:floatText 6s ease-in-out infinite, heartbeatVisual 1.8s infinite;
    text-shadow:0 0 25px rgba(255,255,255,0.9);
}
@keyframes floatText{50%{transform:translateY(-15px);}}
@keyframes heartbeatVisual{50%{transform:scale(1.05);}}

/* Counter */
.counter{
    position:absolute;
    bottom:20px;
    width:100%;
    text-align:center;
    font-size:clamp(0.8rem,3vw,1.2rem);
}

/* Letter */
.letter{
    position:absolute;
    top:50%;left:50%;
    transform:translate(-50%,-50%);
    width:90%;max-width:500px;
    background:#fffef8;
    color:#333;
    padding:30px;
    border-radius:10px;
    display:none;
    font-family:cursive;
}

/* Proposal Mode */
.marry{
    position:absolute;
    inset:0;
    background:black;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    font-family:'Great Vibes',cursive;
    font-size:clamp(2rem,6vw,4rem);
    opacity:0;
    transition:2s;
}

.ring{
    width:120px;height:120px;
    border:10px solid gold;
    border-radius:50%;
    margin-bottom:30px;
    box-shadow:0 0 20px gold;
    animation:ringSlide 2s ease forwards;
    transform:translateY(-200px) rotateY(0deg);
}
@keyframes ringSlide{
    to{transform:translateY(0) rotateY(360deg);}
}

/* Buttons */
button{
    padding:10px 25px;
    margin:10px;
    font-size:1rem;
    border:none;
    border-radius:20px;
    cursor:pointer;
}
.yes{background:#ff69b4;color:white;}
.no{background:#555;color:white;}

/* Ending */
.ending{
    position:absolute;
    inset:0;
    background:white;
    color:black;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Great Vibes',cursive;
    font-size:clamp(2rem,7vw,5rem);
    opacity:0;
    transition:3s;
}

/* Petals */
.petal{
    position:absolute;
    width:15px;height:15px;
    background:radial-gradient(circle at 30% 30%,pink,#ff69b4);
    border-radius:50% 50% 50% 0;
    animation:fall linear infinite;
    pointer-events:none;
}
@keyframes fall{to{transform:translateY(110vh) rotate(360deg);}}

canvas{position:absolute;top:0;left:0;pointer-events:none;}
</style>
</head>
<body>

<canvas id="stars"></canvas>
<canvas id="waves"></canvas>

<div class="love-text">I love you Anya</div>
<div class="counter" id="counter"></div>

<div class="letter" id="letter"></div>

<div class="marry" id="marry">
<div class="ring"></div>
<div>Anya… will you marry me? 💍</div>
<div>
<button class="yes" onclick="sayYes()">Yes</button>
<button class="no" onclick="sayNo()">No</button>
</div>
</div>

<div class="ending" id="ending">Forever begins now ♡<br>17 February 2026</div>

<audio id="ocean" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_7c3c3e57e3.mp3">
</audio>

<audio id="heartbeat">
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_20a4c8c1e1.mp3">
</audio>

<audio id="orchestra">
<source src="https://cdn.pixabay.com/audio/2022/10/18/audio_8b5bb09b35.mp3">
</audio>

<script>
/* 🌞 Real-Time IST Sky + Text Color */
const skyStops = [
  { time: 0.0, colors: ["#0a0f2c", "#1b2550"] }, // Midnight
  { time: 0.25, colors: ["#ff9966", "#ff5e62"] }, // Sunrise
  { time: 0.5, colors: ["#87ceeb", "#4facfe"] },  // Noon
  { time: 0.75, colors: ["#f3904f", "#3b4371"] }, // Sunset
  { time: 1.0, colors: ["#0a0f2c", "#1b2550"] }    // Midnight
];

function getISTTime(){
    return new Date(new Date().toLocaleString("en-US",{timeZone:"Asia/Kolkata"}));
}
function getDayProgress(){
    const ist = getISTTime();
    return (ist.getHours()*3600 + ist.getMinutes()*60 + ist.getSeconds())/86400;
}
function lerpColor(a,b,t){
  const ah=parseInt(a.replace("#",""),16),
        ar=ah>>16, ag=(ah>>8)&0xff, ab=ah&0xff,
        bh=parseInt(b.replace("#",""),16),
        br=bh>>16, bg=(bh>>8)&0xff, bb=bh&0xff,
        rr=ar+t*(br-ar), rg=ag+t*(bg-ag), rb=ab+t*(bb-ab);
  return `rgb(${rr|0},${rg|0},${rb|0})`;
}
function updateSky(){
    const progress = getDayProgress();
    for(let i=0;i<skyStops.length-1;i++){
        const current = skyStops[i];
        const next = skyStops[i+1];
        if(progress >= current.time && progress <= next.time){
            const localT = (progress - current.time)/(next.time - current.time);
            const topColor = lerpColor(current.colors[0], next.colors[0], localT);
            const bottomColor = lerpColor(current.colors[1], next.colors[1], localT);
            document.body.style.background = `linear-gradient(to bottom, ${topColor}, ${bottomColor})`;

            // ✅ Text color: black for day, white for night
            const loveText = document.querySelector(".love-text");
            const counterText = document.querySelector(".counter");
            if(progress >= 0.25 && progress <= 0.75){ // 6AM - 6PM IST
                loveText.style.color = "black";
                counterText.style.color = "black";
            } else {
                loveText.style.color = "white";
                counterText.style.color = "white";
            }
            break;
        }
    }
}
updateSky();
setInterval(updateSky,10000);

/* Counter */
const startDate=new Date("2026-02-17T16:19:00");
setInterval(()=>{
const diff=new Date()-startDate;
const d=Math.floor(diff/86400000);
const h=Math.floor(diff/3600000%24);
const m=Math.floor(diff/60000%60);
const s=Math.floor(diff/1000%60);
document.getElementById("counter").innerText=`Together for ${d} days, ${h} hours, ${m} minutes, ${s} seconds ♡`;
},1000);

/* Stars Morph */
const starCanvas=document.getElementById("stars");
const ctx=starCanvas.getContext("2d");
starCanvas.width=innerWidth; starCanvas.height=innerHeight;
let stars=[];
for(let i=0;i<500;i++){stars.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,size:1});}
function drawStars(){
ctx.clearRect(0,0,innerWidth,innerHeight);
stars.forEach(s=>{
ctx.fillStyle="white";
ctx.fillRect(s.x,s.y,1+Math.sin(Date.now()*0.005),1+Math.sin(Date.now()*0.005));
});
requestAnimationFrame(drawStars);
}
drawStars();

/* Petals */
for(let i=0;i<40;i++){
let p=document.createElement("div");
p.className="petal";
p.style.left=Math.random()*100+"vw";
p.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(p);
}

/* Handwritten Letter */
const letter=document.getElementById("letter");
const text="You are written in my sky and in every future I see.";
let i=0;
function writeLetter(){if(i<text.length){letter.innerHTML+=text.charAt(i);i++;setTimeout(writeLetter,50);}}
document.body.addEventListener("dblclick",()=>{
letter.style.display="block";
writeLetter();
document.getElementById("ocean").play();
});

/* Proposal Mode */
let keyCount=0;
document.addEventListener("keydown",e=>{
if(e.key==="h"){keyCount++; if(keyCount>=5){document.getElementById("marry").style.opacity=1;document.getElementById("heartbeat").play();}}});
function sayYes(){
document.getElementById("marry").style.opacity=0;
document.getElementById("orchestra").play();
document.getElementById("ending").style.opacity=1;
}
function sayNo(){
document.querySelector(".no").style.opacity=0;
setTimeout(()=>{alert("I’ll keep asking forever 💖");},500);
}
</script>
</body>
</html>
