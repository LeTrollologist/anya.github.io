<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check-In 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Playfair Display', serif;
            background: radial-gradient(circle at center, #1a002a 0%, #000 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: white;
        }
        .container {
            z-index: 10;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            padding: 50px;
            border-radius: 40px;
            border: 1px solid rgba(255, 105, 180, 0.3);
            text-align: center;
            box-shadow: 0 0 50px rgba(255, 20, 147, 0.2);
            width: 90%;
            max-width: 450px;
        }
        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 4rem;
            color: #ff69b4;
            text-shadow: 0 0 20px #ff1493;
            margin-bottom: 20px;
        }
        .btn-group { display: flex; flex-direction: column; gap: 15px; }
        button {
            padding: 18px;
            font-family: 'Great Vibes', cursive;
            font-size: 2rem;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.4s;
            color: white;
            background: rgba(255, 105, 180, 0.1);
            border: 1px solid #ff69b4;
        }
        button:hover {
            background: #ff69b4;
            transform: scale(1.05);
            box-shadow: 0 0 30px #ff1493;
        }
        #status { margin-top: 25px; font-size: 1.2rem; color: #ffb6c1; min-height: 1.5em; }
        .home-link {
            margin-top: 30px;
            display: block;
            text-decoration: none;
            color: rgba(255,255,255,0.5);
            font-family: 'Great Vibes', cursive;
            font-size: 1.6rem;
        }
        .home-link:hover { color: #ff69b4; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Check-In</h1>
        <div class="btn-group">
            <button onclick="sendLove('anya')">🌸 Anya</button>
            <button onclick="sendLove('micheal')">💙 Micheal</button>
            <button onclick="sendLove('random')">✨ Respect</button>
        </div>
        <div id="status"></div>
        <!-- IMPORTANT: Update this URL to your actual home page -->
        <a href="https://yourusername.github.io/" class="home-link">🏡 Return Home</a>
    </div>

    <script>
        async function sendLove(type) {
            const status = document.getElementById('status');
            status.innerText = "✨ Sending Love...";
            try {
                const res = await fetch('/api/checkin', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({type: type})
                });
                const data = await res.json();
                if(res.ok) {
                    status.innerText = "💖 " + data.message;
                } else {
                    status.innerText = "❌ Error: " + (data.error || "Failed");
                }
            } catch (e) {
                status.innerText = "❌ Server Unreachable";
            }
        }
    </script>
</body>
</html>
