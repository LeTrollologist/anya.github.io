<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check-In 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink: #ff69b4;
            --glow: #ff1493;
            --glass: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Playfair Display', serif;
            background: #0a0a0c;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: white;
        }

        /* Animated Nebula Background */
        .nebula {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #2c003e 0%, #000 100%);
            z-index: -1;
        }

        #starCanvas {
            position: absolute;
            top: 0; left: 0; z-index: 0;
        }

        .container {
            position: relative;
            z-index: 10;
            background: var(--glass);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            max-width: 500px;
            width: 90%;
            animation: fadeIn 1.5s ease;
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 4rem;
            color: var(--pink);
            text-shadow: 0 0 20px var(--glow);
            margin-bottom: 10px;
        }

        p { font-size: 1.1rem; opacity: 0.8; margin-bottom: 30px; letter-spacing: 1px; }

        .btn-list { display: flex; flex-direction: column; gap: 15px; }

        button {
            padding: 15px;
            font-family: 'Great Vibes', cursive;
            font-size: 1.8rem;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
            color: white;
            background: rgba(255, 105, 180, 0.2);
            border: 1px solid var(--pink);
        }

        button:hover {
            background: var(--pink);
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 0 20px var(--glow);
        }

        #status {
            margin-top: 20px;
            font-size: 1.2rem;
            height: 1.5em;
            color: var(--pink);
        }

        .home-link {
            margin-top: 30px;
            display: block;
            text-decoration: none;
            color: white;
            font-family: 'Great Vibes', cursive;
            font-size: 1.5rem;
            opacity: 0.6;
            transition: 0.3s;
        }

        .home-link:hover { opacity: 1; color: var(--pink); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="nebula"></div>
    <canvas id="starCanvas"></canvas>

    <div class="container">
        <h1>Check-In</h1>
        <p>Sending Love Across the Stars</p>

        <div class="btn-list">
            <button onclick="sendLove('anya')">🌸 Anya</button>
            <button onclick="sendLove('micheal')">💙 Micheal</button>
            <button onclick="sendLove('random')">✨ Pay Respects</button>
        </div>

        <div id="status"></div>

        <a href="https://yourusername.github.io/" class="home-link">🏡 Return Home</a>
    </div>

    <script>
        // Star Particle System
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let stars = [];

        function initStars() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            for(let i=0; i<150; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2,
                    speed: Math.random() * 0.5
                });
            }
        }

        function drawStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white";
            stars.forEach(s => {
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
                ctx.fill();
                s.y -= s.speed;
                if(s.y < 0) s.y = canvas.height;
            });
            requestAnimationFrame(drawStars);
        }

        async function sendLove(type) {
            const status = document.getElementById('status');
            status.innerText = "✨ Sending Love...";
            
            try {
                const res = await fetch('/api/checkin', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({type})
                });
                const data = await res.json();
                if(res.ok) {
                    status.innerText = "💖 " + data.message;
                } else {
                    status.innerText = "❌ Connection Failed";
                }
            } catch {
                status.innerText = "❌ Server Error";
            }
        }

        initStars();
        drawStars();
    </script>
</body>
</html>
