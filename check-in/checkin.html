<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Check In ❤️</title>
<style>
/* --- General Page Styles --- */
body {
    margin: 0;
    font-family: 'Playfair Display', serif;
    background: radial-gradient(circle at top, #2c003e, #1b001f);
    color: #ffe4f0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    overflow-x: hidden;
}

h1 {
    font-size: 3em;
    margin-top: 1em;
    text-align: center;
    color: #ff7fe0;
    text-shadow: 0 0 10px #ff7fe0, 0 0 20px #ff4fcf;
}

p#message {
    font-size: 1.5em;
    margin: 1em 0;
    text-align: center;
    color: #ffd1e8;
    transition: all 0.3s ease;
    min-height: 2em;
}

/* --- Buttons --- */
.button-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 1em;
    margin-top: 2em;
}

button {
    background: linear-gradient(145deg, #ff66c4, #ff1f96);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 1em 2em;
    font-size: 1.2em;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 5px 15px rgba(255,0,150,0.4);
}

button:hover {
    transform: scale(1.1) rotate(-2deg);
    box-shadow: 0 8px 20px rgba(255,0,150,0.7);
}

/* --- Hearts animation --- */
.heart {
    position: absolute;
    font-size: 2em;
    animation: floatUp 2s ease-out forwards;
}

@keyframes floatUp {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-150px) scale(1.5); }
}

/* --- Return Home Link --- */
a#homeLink {
    margin-top: 3em;
    font-size: 1.2em;
    color: #ffb3d9;
    text-decoration: underline;
}
a#homeLink:hover {
    color: #ff66c4;
}
</style>
</head>
<body>

<h1>Check In ❤️</h1>
<p id="message">Welcome! Choose your check-in 💌</p>

<div class="button-container">
    <button id="anyaBtn">Anya 💖</button>
    <button id="michealBtn">Micheal 💙</button>
    <button id="randomBtn">Random 💌</button>
</div>

<a href="index.html" id="homeLink">Return Home 🏠</a>

<script>
// --- API Config ---
const API_URL = "/api/checkin"; // Flask endpoint
const ANYA_MESSAGES = [
    "I love you mostest times infinity times perpetuity 💖",
    "I love you more than chocos 🍫❤️",
    "You are my sunshine every day ☀️💕",
    "Forever and always, my heart is yours 💞",
    "You're my favorite human in the universe 🌌💖"
];

// --- Utility: Animate heart ---
function createHeart(x, y) {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.style.left = `${x}px`;
    heart.style.top = `${y}px`;
    heart.textContent = "💖";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 2000);
}

// --- Handle Check-in ---
async function sendCheckIn(type) {
    try {
        const res = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ type })
        });
        const data = await res.json();
        document.getElementById("message").textContent = data.message;

        // Heart animation at random positions
        for (let i=0; i<5; i++) {
            const x = Math.random() * window.innerWidth;
            const y = Math.random() * window.innerHeight * 0.6;
            createHeart(x, y);
        }
    } catch (err) {
        document.getElementById("message").textContent = "Oops! Something went wrong 💔";
        console.error(err);
    }
}

// --- Event Listeners ---
document.getElementById("anyaBtn").addEventListener("click", () => sendCheckIn("anya"));
document.getElementById("michealBtn").addEventListener("click", () => sendCheckIn("micheal"));
document.getElementById("randomBtn").addEventListener("click", () => sendCheckIn("random"));
</script>

</body>
</html>
