<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loving Check-In 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink: #ff69b4;
            --dark-pink: #ff1493;
            --soft-white: #ffe4e1;
            --bg-gradient: radial-gradient(circle at center, #2c003e 0%, #000000 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Playfair Display', serif;
            background: var(--bg-gradient);
            color: var(--soft-white);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Canvas for magical particles */
        #particleCanvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
        }

        .content {
            z-index: 10;
            text-align: center;
            background: rgba(0, 0, 0, 0.4);
            padding: 3rem;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 105, 180, 0.2);
            box-shadow: 0 0 50px rgba(255, 20, 147, 0.2);
            max-width: 90%;
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(3rem, 8vw, 5rem);
            color: var(--pink);
            text-shadow: 0 0 20px var(--dark-pink);
            margin-bottom: 10px;
        }

        #status-text {
            font-size: 1.2rem;
            margin-bottom: 30px;
            min-height: 1.5em;
            color: var(--soft-white);
            opacity: 0.8;
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }

        button {
            padding: 15px 35px;
            font-family: 'Great Vibes', cursive;
            font-size: 1.8rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            color: white;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .btn-anya { background: linear-gradient(45deg, #ff1493, #ff69b4); box-shadow: 0 10px 20px rgba(255, 20, 147, 0.4); }
        .btn-micheal { background: linear-gradient(45deg, #00bfff, #1e90ff); box-shadow: 0 10px 20px rgba(30, 144, 255, 0.4); }
        .btn-random { background: linear-gradient(45deg, #9370db, #da70d6); box-shadow: 0 10px 20px rgba(147, 112, 219, 0.4); }

        button:hover {
            transform: scale(1.1) translateY(-5px);
            box-shadow: 0 15px 30px rgba(255, 105, 180, 0.6);
        }

        button:active { transform: scale(0.95); }

        .back-home {
            margin-top: 50px;
            position: relative;
            display: inline-block;
        }

        .back-home a {
            color: var(--soft-white);
            text-decoration: none;
            font-family: 'Great Vibes', cursive;
            font-size: 2rem;
            transition: color 0.3s;
        }

        .back-home a:hover { color: var(--pink); }

        /* Floating Animation */
        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .floating { animation: floating 3s ease-in-out infinite; }
    </style>
</head>
<body>

    <canvas id="particleCanvas"></canvas>

    <div class="content floating">
        <h1>💖 Check-In 💖</h1>
        <p id="status-text">Choose a heart to send to Discord...</p>

        <div class="btn-group">
            <button class="btn-anya" onclick="sendCheckin('anya')">Anya 🌸</button>
            <button class="btn-micheal" onclick="sendCheckin('micheal')">Michael 💙</button>
            <button class="btn-random" onclick="sendCheckin('random')">Respect 💌</button>
        </div>

        <div class="back-home">
            <a href="index.html">🏡 Return Home</a>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y, color, speedX, speedY) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.speedX = speedX;
                this.speedY = speedY;
                this.size = Math.random() * 5 + 2;
                this.opacity = 1;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.opacity -= 0.01;
            }
            draw() {
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function createBurst(x, y, color) {
            for (let i = 0; i < 30; i++) {
                particles.push(new Particle(
                    x, y, color, 
                    (Math.random() - 0.5) * 10, 
                    (Math.random() - 0.5) * 10
                ));
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles = particles.filter(p => p.opacity > 0);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        async function sendCheckin(type) {
            const status = document.getElementById('status-text');
            const colors = { anya: '#ff1493', micheal: '#00bfff', random: '#9370db' };
            
            // Visual Burst
            createBurst(window.innerWidth / 2, window.innerHeight / 2, colors[type]);
            status.innerText = "Sending your love... ✨";

            try {
                const response = await fetch('/api/checkin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type: type })
                });

                if (response.ok) {
                    status.innerText = "💖 Love delivered to Discord!";
                    setTimeout(() => status.innerText = "Send another?", 3000);
                } else {
                    status.innerText = "❌ Discord is sleeping. Try again later.";
                }
            } catch (err) {
                status.innerText = "🚀 Error reaching the server.";
            }
        }

        // Mouse trail
        window.addEventListener('mousemove', (e) => {
            if (Math.random() > 0.8) {
                particles.push(new Particle(e.clientX, e.clientY, '#ffb6c1', (Math.random()-0.5)*2, (Math.random()-0.5)*2));
            }
        });
    </script>
</body>
</html>
