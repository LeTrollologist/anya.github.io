<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check-In 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Playfair Display', serif;
            background: #050505;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: white;
        }
        #starCanvas { position: absolute; top: 0; left: 0; z-index: 1; }
        .container {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(255, 105, 180, 0.3);
            text-align: center;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }
        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 4rem;
            color: #ff69b4;
            text-shadow: 0 0 20px #ff1493;
            margin-bottom: 20px;
        }
        .btn-list { display: flex; flex-direction: column; gap: 15px; }
        button {
            padding: 15px;
            font-family: 'Great Vibes', cursive;
            font-size: 2rem;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
            color: white;
            background: rgba(255, 105, 180, 0.1);
            border: 1px solid #ff69b4;
        }
        button:hover { background: #ff69b4; transform: scale(1.05); box-shadow: 0 0 20px #ff1493; }
        #status { margin-top: 20px; font-size: 1.2rem; color: #ffb6c1; min-height: 1.5em; }
        .home-link {
            margin-top: 30px;
            display: block;
            text-decoration: none;
            color: rgba(255,255,255,0.6);
            font-family: 'Great Vibes', cursive;
            font-size: 1.6rem;
        }
    </style>
</head>
<body>
    <canvas id="starCanvas"></canvas>
    <div class="container">
        <h1>Check-In</h1>
        <div class="btn-list">
            <button onclick="sendLove('anya')">🌸 Anya</button>
            <button onclick="sendLove('micheal')">💙 Micheal</button>
            <button onclick="sendLove('random')">✨ Respect</button>
        </div>
        <div id="status"></div>
        <a href="https://yourusername.github.io/" class="home-link">🏡 Return Home</a>
    </div>

    <script>
        // Star Background
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for(let i=0; i<100; i++) stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2});
        }
        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = "white";
            stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill(); s.y -= 0.5; if(s.y<0) s.y=canvas.height; });
            requestAnimationFrame(draw);
        }
        init(); draw();

        async function sendLove(type) {
            const status = document.getElementById('status');
            status.innerText = "✨ Sending Love...";
            try {
                const res = await fetch('/api/checkin', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({type})
                });
                const data = await res.json();
                if(res.ok) status.innerText = "💖 " + data.message;
                else status.innerText = "❌ " + data.error;
            } catch (e) { status.innerText = "❌ Server Offline"; }
        }
    </script>
</body>
</html>
