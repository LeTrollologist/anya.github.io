<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 💖 Page Not Found</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ================= GLOBAL ================= */
*{margin:0;padding:0;box-sizing:border-box;}
body{
    height:100vh; overflow:hidden; font-family:'Playfair Display',serif; background:#0b0b1e; color:white;
}
canvas{position:absolute; top:0; left:0; z-index:1;}
header{
    position:absolute; top:20px; width:100%; text-align:center; z-index:50;
    font-family:'Great Vibes',cursive; font-size:clamp(2rem,5vw,4rem); text-shadow:0 0 25px #ff69b4;
}
#loveMessage{
    position:absolute; top:20%; width:100%; text-align:center; font-size:clamp(1.5rem,4vw,3rem);
    font-family:'Great Vibes',cursive; color:#ffb6c1; text-shadow:0 0 15px #ff69b4;
    z-index:50;
}
#subMessage{
    position:absolute; top:35%; width:100%; text-align:center; font-size:clamp(1rem,3vw,2rem);
    color:#ffe4e1; z-index:50;
}

/* ================= HEART SNAKE GAME ================= */
#gameContainer{
    position:absolute; bottom:50px; left:50%; transform:translateX(-50%);
    width:90%; max-width:600px; aspect-ratio:1; z-index:50;
}
#gameCanvas{
    width:100%; height:100%; background:rgba(0,0,0,0.1); border:2px solid #ff69b4;
    border-radius:15px; backdrop-filter: blur(3px); box-shadow:0 0 25px rgba(255,105,180,0.5);
}

/* ================= SCORE & CONTROLS ================= */
#score{
    position:absolute; bottom:10px; width:100%; text-align:center; font-family:'Great Vibes',cursive;
    font-size:clamp(1.2rem,3vw,2rem); color:#ff69b4; text-shadow:0 0 10px white; z-index:50;
}
#homeBtn{
    position:absolute; bottom:10px; right:20px; font-family:'Great Vibes',cursive; background:#ff69b4;
    border:none; border-radius:25px; padding:10px 20px; color:white; font-size:1rem;
    cursor:pointer; z-index:50; box-shadow:0 4px 15px rgba(255,105,180,0.6); transition:0.3s;
}
#homeBtn:hover{transform:scale(1.1); box-shadow:0 6px 25px rgba(255,105,180,0.8);}

/* ================= PARTICLE BACKGROUND ================= */
.petal{
    position:absolute; width:12px; height:12px;
    background:radial-gradient(circle at 30% 30%,pink,#ff69b4);
    border-radius:50%; animation:fall linear infinite; pointer-events:none; z-index:1;
}
@keyframes fall{to{transform:translateY(110vh) rotate(360deg);}}

.glitter{
    position:absolute; width:4px; height:4px; background:white; border-radius:50%; opacity:0.8;
    animation:glitterMove linear infinite; z-index:1;
}
@keyframes glitterMove{0%{transform:translateY(0) rotate(0deg);opacity:0.7;}50%{opacity:1;}100%{transform:translateY(100vh) rotate(360deg);opacity:0;}}

</style>
</head>
<body>

<header>💔 Oops! Lost in Love 💔</header>
<div id="loveMessage">Anya, you are always in my heart 💖</div>
<div id="subMessage">This page doesn't exist… but love always does 🌸</div>

<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    <div id="score">Hearts eaten: 0</div>
</div>

<button id="homeBtn" onclick="location.href='index.html'">Return Home 💖</button>

<script>
/* ================= PARTICLES ================= */
const petals=[], glitters=[];
for(let i=0;i<50;i++){
    const p=document.createElement('div'); p.classList.add('petal');
    p.style.left=Math.random()*100+'vw';
    p.style.top=Math.random()*100+'vh';
    p.style.animationDuration=(5+Math.random()*5)+'s';
    document.body.appendChild(p); petals.push(p);
}
for(let i=0;i<80;i++){
    const g=document.createElement('div'); g.classList.add('glitter');
    g.style.left=Math.random()*100+'vw';
    g.style.top=Math.random()*100+'vh';
    g.style.animationDuration=(3+Math.random()*4)+'s';
    document.body.appendChild(g); glitters.push(g);
}

/* ================= HEART SNAKE GAME ================= */
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
const grid=20;
let snake=[{x:10,y:10}];
let heart={x:15,y:15};
let dx=1, dy=0;
let score=0;

function drawHeart(x,y){
    ctx.fillStyle='red';
    ctx.beginPath();
    const s=grid/2;
    ctx.moveTo(x*s, y*s+s/4);
    ctx.bezierCurveTo(x*s, y*s, x*s+s/4, y*s, x*s+s/2, y*s/4);
    ctx.bezierCurveTo(x*s+3*s/4, y*s, x*s+s, y*s, x*s+s, y*s+s/4);
    ctx.bezierCurveTo(x*s+s, y*s+s/2, x*s+s/2, y*s+3*s/4, x*s+s/2, y*s+s);
    ctx.bezierCurveTo(x*s+s/2, y*s+3*s/4, x*s, y*s+s/2, x*s, y*s+s/4);
    ctx.fill();
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    // draw heart
    drawHeart(heart.x, heart.y);
    // draw snake
    for(let i=0;i<snake.length;i++){
        drawHeart(snake[i].x, snake[i].y);
    }
}
function update(){
    const head={x:snake[0].x+dx, y:snake[0].y+dy};
    snake.unshift(head);
    if(head.x===heart.x && head.y===heart.y){
        score++;
        document.getElementById('score').innerText=`Hearts eaten: ${score}`;
        heart={x:Math.floor(Math.random()*(canvas.width/grid)), y:Math.floor(Math.random()*(canvas.height/grid))};
    } else {
        snake.pop();
    }
    // collision with walls
    if(head.x<0||head.y<0||head.x>=canvas.width/grid||head.y>=canvas.height/grid){
        alert(`Oops! You crashed 💔. Hearts eaten: ${score}`);
        snake=[{x:10,y:10}]; dx=1; dy=0; score=0;
        document.getElementById('score').innerText=`Hearts eaten: ${score}`;
    }
    // collision with self
    for(let i=1;i<snake.length;i++){
        if(snake[i].x===head.x && snake[i].y===head.y){
            alert(`Oops! Self-collision 💔. Hearts eaten: ${score}`);
            snake=[{x:10,y:10}]; dx=1; dy=0; score=0;
            document.getElementById('score').innerText=`Hearts eaten: ${score}`;
        }
    }
}
document.addEventListener('keydown', e=>{
    switch(e.key){
        case'ArrowUp': if(dy===0){dx=0;dy=-1;} break;
        case'ArrowDown': if(dy===0){dx=0;dy=1;} break;
        case'ArrowLeft': if(dx===0){dx=-1;dy=0;} break;
        case'ArrowRight': if(dx===0){dx=1;dy=0;} break;
    }
});

function gameLoop(){
    update();
    draw();
    requestAnimationFrame(gameLoop);
}
gameLoop();
</script>
</body>
</html>
