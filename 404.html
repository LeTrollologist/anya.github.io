<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 💖 Page Not Found</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ================= GLOBAL ================= */
*{margin:0;padding:0;box-sizing:border-box;}
body{overflow:hidden;height:100vh;font-family:'Playfair Display',serif;background:linear-gradient(135deg,#ff9ec4,#ff69b4);display:flex;align-items:center;justify-content:center;flex-direction:column;}
h1{font-family:'Great Vibes',cursive;font-size:clamp(3rem,8vw,6rem);color:white;text-shadow:0 0 15px #ff69b4,0 0 25px #ffb6c1;margin-bottom:10px;text-align:center;}
#subtext{font-family:'Playfair Display',serif;color:white;text-align:center;margin-bottom:30px;text-shadow:0 0 10px rgba(0,0,0,0.4);}
#gameContainer{position:relative;}
canvas{border-radius:20px;box-shadow:0 0 40px rgba(255,105,180,0.6);}
#scoreBoard{color:white;font-family:'Great Vibes',cursive;font-size:2rem;margin-top:15px;text-shadow:0 0 10px black;}
.pedal-controls{display:flex;gap:20px;margin-top:20px;}
.pedal{background:rgba(255,255,255,0.2);padding:15px 25px;border-radius:25px;color:white;font-family:'Great Vibes',cursive;font-size:1.5rem;text-shadow:0 0 5px black;cursor:pointer;user-select:none;transition:0.2s;}
.pedal:active{transform:scale(1.1);background:rgba(255,105,180,0.6);}
.restart-btn{margin-top:20px;padding:12px 35px;background:linear-gradient(145deg,#ff9ec4,#ff69b4);border:none;border-radius:25px;color:white;font-family:'Great Vibes',cursive;font-size:1.8rem;cursor:pointer;box-shadow:0 4px 15px rgba(255,105,180,0.6);transition:0.2s;}
.restart-btn:hover{transform:scale(1.1);box-shadow:0 6px 25px rgba(255,105,180,0.8);}
</style>
</head>
<body>

<h1>Oops! You crashed 💔</h1>
<div id="subtext">Hearts eaten: <span id="heartsEaten">0</span></div>
<div id="gameContainer">
    <canvas id="heartSnake" width="500" height="500"></canvas>
</div>
<div class="pedal-controls">
    <div class="pedal" id="leftPedal">⬆️ / W</div>
    <div class="pedal" id="rightPedal">⬇️ / S</div>
</div>
<button class="restart-btn" onclick="resetGame()">Restart</button>

<script>
const canvas = document.getElementById('heartSnake');
const ctx = canvas.getContext('2d');
const size = 20; // snake segment
let snake = [{x:10,y:10}];
let hearts = [];
let dir = {x:0,y:0};
let score = 0;
let gameOver = false;
const gridWidth = canvas.width/size;
const gridHeight = canvas.height/size;

// Create random heart
function spawnHeart(){
    let hx = Math.floor(Math.random()*gridWidth);
    let hy = Math.floor(Math.random()*gridHeight);
    hearts.push({x:hx,y:hy});
}

// Reset game
function resetGame(){
    snake=[{x:10,y:10}];
    dir={x:0,y:0};
    hearts=[];
    spawnHeart();
    score=0;
    gameOver=false;
    document.getElementById('heartsEaten').innerText=score;
    draw();
}

// Draw everything
function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // Draw hearts
    hearts.forEach(h=>{
        ctx.fillStyle='red';
        ctx.beginPath();
        ctx.moveTo(h.x*size+size/2,h.y*size+size/4);
        ctx.bezierCurveTo(h.x*size,h.y*size,h.x*size,h.y*size+size/2,h.x*size+size/2,h.y*size+size);
        ctx.bezierCurveTo(h.x*size+size,h.y*size+size/2,h.x*size+size,h.y*size,h.x*size+size/2,h.y*size+size/4);
        ctx.fill();
    });

    // Draw snake
    snake.forEach((s,i)=>{
        ctx.fillStyle=i===0?'#fff':'#ff69b4';
        ctx.fillRect(s.x*size,s.y*size,size,size);
    });
}

// Update snake
function update(){
    if(gameOver) return;

    const head = {x:snake[0].x + dir.x, y:snake[0].y + dir.y};

    // Collision wall
    if(head.x<0||head.y<0||head.x>=gridWidth||head.y>=gridHeight) return crash();
    // Collision self
    if(snake.some(s=>s.x===head.x&&s.y===head.y)) return crash();

    snake.unshift(head);

    // Eat heart
    let eatenIndex = hearts.findIndex(h=>h.x===head.x && h.y===head.y);
    if(eatenIndex>-1){
        hearts.splice(eatenIndex,1);
        score++;
        document.getElementById('heartsEaten').innerText=score;
        spawnHeart();
    }else{
        snake.pop();
    }
}

// Crash
function crash(){
    gameOver=true;
    alert(`You crashed! 💔 Hearts eaten: ${score}`);
}

// Pedal keyboard controls
document.addEventListener('keydown',e=>{
    if(e.key==='ArrowUp'||e.key==='w'||e.key==='W'){dir={x:0,y:-1};}
    if(e.key==='ArrowDown'||e.key==='s'||e.key==='S'){dir={x:0,y:1};}
});

// Pedal on-screen controls
document.getElementById('leftPedal').addEventListener('click',()=>{dir={x:0,y:-1};});
document.getElementById('rightPedal').addEventListener('click',()=>{dir={x:0,y:1};});

// Main loop
spawnHeart();
setInterval(()=>{update();draw();},150);
</script>
</body>
</html>
