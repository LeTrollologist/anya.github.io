<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 💖 Page Not Found</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
<style>
/* =============== GLOBAL STYLES =============== */
*{margin:0;padding:0;box-sizing:border-box;}
body{overflow:hidden;height:100vh;background:linear-gradient(135deg,#ffb6c1,#ff69b4,#ffe4e1);display:flex;align-items:center;justify-content:center;flex-direction:column;font-family:'Playfair Display',serif;}
h1{font-family:'Great Vibes',cursive;font-size:clamp(3rem,8vw,6rem);color:white;text-shadow:0 0 15px #ff69b4,0 0 25px #ffb6c1;margin-bottom:10px;text-align:center;animation:fadeIn 1s ease forwards;}
#message{font-family:'Playfair Display',serif;color:white;text-align:center;margin-bottom:30px;text-shadow:0 0 15px rgba(0,0,0,0.4);font-size:1.5rem;line-height:1.8;animation:fadeIn 2s ease forwards;}
button{padding:15px 40px;background:linear-gradient(145deg,#ff9ec4,#ff69b4);border:none;border-radius:30px;color:white;font-family:'Great Vibes',cursive;font-size:1.8rem;cursor:pointer;box-shadow:0 6px 25px rgba(255,105,180,0.6);transition:0.3s;}
button:hover{transform:scale(1.05);box-shadow:0 8px 35px rgba(255,105,180,0.8);}
canvas{position:absolute;top:0;left:0;z-index:-1;}
@keyframes fadeIn{0%{opacity:0;transform:translateY(20px);}100%{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
<h1>Oops! Page not found 💔</h1>
<div id="message">Loading sweet words...</div>
<button onclick="newMessage()">Send me a new hug 💌</button>
<canvas id="canvas"></canvas>

<script>
// ======= LOVELY MESSAGES POOL =======
const messages = [
  "Don't worry, you're always in my heart 💖",
  "Even lost pages can't hide my love for you 💕",
  "Roses are red, violets are blue, this page is missing, but I still love you 🌹",
  "Every broken link brings me closer to you ❤️",
  "You found my secret love corner 🥰",
  "Oops! Even 404s can't stop my hugs 🤗",
  "I'm sending you a thousand floating hearts just because 💌",
  "You're the reason my code is sweeter 💖",
  "Lost page, found love 💕",
  "I wish I could hold you while you see this page 🫂",
  "This page is missing, but my feelings aren't 💝",
  "You're a spark in my code, always lighting up 💫",
  "My heart beats in pixels for you 💓",
  "Even errors can be cute when you think of us 💞",
  "Sweetest 404 ever, just like you 🥰",
  "I wrote this page thinking of your smile 😊",
  "You make broken pages feel magical ✨",
  "If pages were hearts, you'd be all of them ❤️",
  "Not found? More like my heart found you 💖",
  "Every bug reminds me to love you more 💕"
];

// ======= DISPLAY RANDOM MESSAGE =======
const messageEl = document.getElementById('message');
function newMessage(){
  const index = Math.floor(Math.random()*messages.length);
  messageEl.innerText = messages[index];
}

// Initialize with a random message
newMessage();

// ======= CANVAS HEART & PARTICLE EFFECT =======
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let width = canvas.width = window.innerWidth;
let height = canvas.height = window.innerHeight;
let particles = [];

window.addEventListener('resize', ()=>{
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
});

// Particle class
class HeartParticle{
  constructor(){
    this.x = Math.random()*width;
    this.y = Math.random()*height;
    this.size = Math.random()*15+5;
    this.speedX = Math.random()*1-0.5;
    this.speedY = Math.random()*1-0.5;
    this.alpha = Math.random()*0.8+0.2;
    this.color = `hsl(${Math.random()*360},70%,80%)`;
  }
  update(){
    this.x += this.speedX;
    this.y += this.speedY;
    if(this.x<0||this.x>width)this.speedX*=-1;
    if(this.y<0||this.y>height)this.speedY*=-1;
  }
  draw(){
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.beginPath();
    // draw heart
    let topCurveHeight = this.size * 0.3;
    ctx.moveTo(this.x, this.y + topCurveHeight);
    ctx.bezierCurveTo(
      this.x, this.y,
      this.x - this.size/2, this.y,
      this.x - this.size/2, this.y + topCurveHeight
    );
    ctx.bezierCurveTo(
      this.x - this.size/2, this.y + (this.size+topCurveHeight)/2,
      this.x, this.y + (this.size+topCurveHeight)/2,
      this.x, this.y + this.size
    );
    ctx.bezierCurveTo(
      this.x, this.y + (this.size+topCurveHeight)/2,
      this.x + this.size/2, this.y + (this.size+topCurveHeight)/2,
      this.x + this.size/2, this.y + topCurveHeight
    );
    ctx.bezierCurveTo(
      this.x + this.size/2, this.y,
      this.x, this.y,
      this.x, this.y + topCurveHeight
    );
    ctx.fillStyle=this.color;
    ctx.fill();
    ctx.restore();
  }
}

// Generate particles
for(let i=0;i<100;i++)particles.push(new HeartParticle());

// Animate
function animate(){
  ctx.clearRect(0,0,width,height);
  particles.forEach(p=>{
    p.update();
    p.draw();
  });
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
