<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Magical Love – Contact 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
    overflow-x:hidden;
    min-height:100vh;
    font-family:'Playfair Display',serif;
    transition:background 1s linear;
}
body::after{
    content:'';
    position:fixed;
    inset:0;
    pointer-events:none;
    background:radial-gradient(circle at center,transparent 60%,rgba(0,0,0,0.8));
    z-index: 1;
}

/* Header */
header{
    position:relative;
    width:100%;
    padding:15px;
    display:flex;
    justify-content:center;
    gap:30px;
    align-items:center;
    z-index:50;
    font-family:'Great Vibes',cursive;
    font-size:clamp(1.5rem,3vw,2.2rem);
    color:white;
    text-shadow:0 0 10px black;
}
header a{
    font-family:'Playfair Display',serif;
    font-size:1rem;
    text-decoration:none;
    color:white;
    font-weight:bold;
    transition:0.3s;
}
header a:hover{color:#ff69b4;}

/* Counter */
.counter{
    text-align:center;
    margin-top:10px;
    font-family:'Great Vibes',cursive;
    font-size:clamp(1.2rem,3vw,2rem);
    color:white;
    text-shadow:0 0 10px black;
    z-index: 20;
    position: relative;
}

/* Floating Title */
.page-title{
    text-align:center;
    font-family:'Great Vibes',cursive;
    font-size:clamp(3rem, 6vw, 4rem);
    color:white;
    margin-top:40px;
    animation:floatTitle 6s ease-in-out infinite;
    text-shadow:0 0 20px #ff69b4;
    z-index: 20;
    position: relative;
}
@keyframes floatTitle{
    50%{transform:translateY(-10px);}
}

/* Contact Container & Cards */
.contact-container {
    display: flex;
    justify-content: center;
    gap: 40px;
    flex-wrap: wrap;
    width: 90%;
    max-width: 800px;
    margin: 50px auto 100px auto;
    position: relative;
    z-index: 20;
}

.contact-card {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(15px);
    border: 2px solid rgba(255, 255, 255, 0.2);
    padding: 40px 30px;
    border-radius: 25px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    width: 280px;
    text-align: center;
    transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
    cursor: pointer;
    color: white;
    position: relative;
    overflow: hidden;
}

/* Glass Shine Effect */
.contact-card::before {
    content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%);
    opacity: 0; transition: 0.5s; pointer-events: none;
    transform: scale(0.5);
}
.contact-card:hover::before { opacity: 1; transform: scale(1); }

/* Hover States */
.contact-card:hover {
    transform: translateY(-12px);
    box-shadow: 0 20px 50px rgba(255, 105, 180, 0.4);
    border-color: rgba(255, 105, 180, 0.6);
}

.card-icon svg {
    width: 65px; height: 65px; fill: white; margin-bottom: 15px;
    transition: fill 0.4s ease, transform 0.4s ease;
}
.contact-card:hover .card-icon svg { transform: scale(1.1); }
.contact-card:hover .discord svg { fill: #5865F2; filter: drop-shadow(0 0 10px #5865F2); }
.contact-card:hover .snapchat svg { fill: #FFFC00; filter: drop-shadow(0 0 10px #FFFC00); }

.card-title { font-family: 'Great Vibes', cursive; font-size: 2.5rem; margin-bottom: 5px; text-shadow: 0 2px 5px rgba(0,0,0,0.5);}
.card-username { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: bold; margin-bottom: 15px; letter-spacing: 1px; }

.copy-hint { 
    font-size: 0.95rem; opacity: 0.9; background: rgba(0,0,0,0.3); 
    padding: 8px 18px; border-radius: 20px; display: inline-block; 
    transition: 0.3s; pointer-events: none; font-weight: bold;
}
.contact-card:hover .copy-hint { background: rgba(255, 105, 180, 0.5); transform: scale(1.05); }

/* Click Animations */
@keyframes popCard {
    0% { transform: translateY(-12px) scale(1); }
    50% { transform: translateY(-12px) scale(0.95); }
    100% { transform: translateY(-12px) scale(1); }
}
.anim-pop { animation: popCard 0.3s ease-out forwards; }
.success-glow { border-color: #00ff88 !important; box-shadow: 0 20px 50px rgba(0, 255, 136, 0.4) !important; }
.success-hint { background: rgba(0, 255, 136, 0.5) !important; }

/* Click Floating Heart */
.click-heart {
    position: absolute;
    font-size: 1.5rem;
    pointer-events: none;
    animation: floatUp 1s ease-out forwards;
    z-index: 100;
}
@keyframes floatUp {
    0% { transform: translateY(0) scale(0.5); opacity: 1; }
    100% { transform: translateY(-60px) scale(1.5); opacity: 0; }
}

/* Petals + Glitter */
.petal,.glitter{ position:fixed; pointer-events:none; z-index:5; }
.petal{
    width:15px;height:15px;
    background:radial-gradient(circle at 30% 30%,pink,#ff69b4);
    border-radius:50% 50% 50% 0; animation:fall linear infinite;
}
.glitter{
    width:3px;height:3px; border-radius:50%; background:white;
    opacity:0.7; animation:glitterMove linear infinite;
}
@keyframes fall{ to{transform:translateY(110vh) rotate(360deg);} }
@keyframes glitterMove{
    0%{transform:translateY(0);opacity:0.7;}
    50%{opacity:1;}
    100%{transform:translateY(100vh);opacity:0;}
}

/* Canvas */
canvas{ position:fixed; top:0; left:0; pointer-events:none; z-index:0; }
</style>
</head>

<body>

<header>
💖 Our Magical Love 💖
<a href="index.html">HOME</a>
<a href="album.html">ALBUM</a>
<a href="#">CONTACT</a>
</header>

<div class="counter" id="counter"></div>

<div class="page-title">Reach Me ✨</div>

<div class="contact-container">
    
    <!-- Discord Tile -->

<canvas id="sun"></canvas>
<canvas id="moon"></canvas>

<!-- SunCalc Script -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>

<script>
// --- Copy to Clipboard Functionality ---
async function copyText(event, text, cardElement) {
    try {
        await navigator.clipboard.writeText(text);
        
        // Spawn Floating Heart exactly at cursor
        const rect = cardElement.getBoundingClientRect();
        const x = event.clientX - rect.left;
        const y = event.clientY - rect.top;
        
        const heart = document.createElement('div');
        heart.className = 'click-heart';
        heart.innerText = ['💖', '✨', '💌', '🌸'][Math.floor(Math.random() * 4)];
        heart.style.left = `${x}px`;
        heart.style.top = `${y}px`;
        cardElement.appendChild(heart);

        // Visual Feedback Animations
        const hint = cardElement.querySelector('.copy-hint');
        const originalText = hint.innerHTML;
        
        cardElement.classList.add('anim-pop');
        cardElement.classList.add('success-glow');
        hint.innerHTML = "Copied! ✔️";
        hint.classList.add('success-hint');

        // Clean up animations and reset text after 2 seconds
        setTimeout(() => {
            cardElement.classList.remove('anim-pop');
            cardElement.classList.remove('success-glow');
            hint.innerHTML = originalText;
            hint.classList.remove('success-hint');
            heart.remove();
        }, 2000);

    } catch (err) {
        console.error('Failed to copy: ', err);
        alert('Failed to copy text. Please try again!');
    }
}

// --- Background Sky Dynamics (SunCalc) ---
const lat=22.5726,lng=88.3639; // Kolkata Coordinates
const sunCanvas=document.getElementById("sun"), sunCtx=sunCanvas.getContext("2d"),
moonCanvas=document.getElementById("moon"), moonCtx=moonCanvas.getContext("2d");

function resize(){
    sunCanvas.width=moonCanvas.width=innerWidth;
    sunCanvas.height=moonCanvas.height=innerHeight;
}
resize();
addEventListener("resize",resize);

function updateBackground(sunAlt){
    const t=Math.max(0,Math.min(1,(sunAlt+Math.PI/2)/Math.PI));
    const top=`rgb(${25+205*t},${50+130*t},${80+175*t})`;
    const bottom=`rgb(${10+20*t},${20+40*t},${40+60*t})`;
    document.body.style.background=`linear-gradient(to bottom,${top},${bottom})`;
}

function drawSky(){
    const now=new Date();
    const sunPos=SunCalc.getPosition(now,lat,lng);
    updateBackground(sunPos.altitude);

    sunCtx.clearRect(0,0,innerWidth,innerHeight);
    if(sunPos.altitude>-0.1){
        const sx=(sunPos.azimuth+Math.PI)/(2*Math.PI)*innerWidth;
        const sy=innerHeight*(1-(sunPos.altitude+Math.PI/2)/Math.PI);
        sunCtx.beginPath();
        sunCtx.fillStyle="yellow";
        sunCtx.arc(sx,sy,30,0,Math.PI*2);
        sunCtx.fill();
    }

    const moonPos=SunCalc.getMoonPosition(now,lat,lng);
    const moonIll=SunCalc.getMoonIllumination(now);

    moonCtx.clearRect(0,0,innerWidth,innerHeight);
    if(moonPos.altitude>-0.1){
        const mx=(moonPos.azimuth+Math.PI)/(2*Math.PI)*innerWidth;
        const my=innerHeight*(1-(moonPos.altitude+Math.PI/2)/Math.PI);

        moonCtx.beginPath();
        moonCtx.fillStyle="#ddd";
        moonCtx.arc(mx,my,25,0,Math.PI*2);
        moonCtx.fill();

        moonCtx.globalCompositeOperation="destination-out";
        moonCtx.beginPath();
        const shift=25*(1-moonIll.fraction);
        moonCtx.ellipse(mx+shift,my,25,25,0,0,Math.PI*2);
        moonCtx.fill();
        moonCtx.globalCompositeOperation="source-over";
    }

    requestAnimationFrame(drawSky);
}
drawSky();

// --- Relationship Counter ---
const startDate=new Date("2026-02-17T16:19:00+05:30");
const counterEl=document.getElementById("counter");
setInterval(()=>{
    const diff=new Date()-startDate;
    const d=Math.floor(diff/86400000);
    counterEl.innerHTML=`${d} Days Together 💖`;
},1000);

// --- Petals Animation ---
for(let i=0;i<30;i++){
    let p=document.createElement("div");
    p.className="petal";
    p.style.left=Math.random()*100+"vw";
    p.style.animationDuration=(5+Math.random()*5)+"s";
    document.body.appendChild(p);
}

// --- Glitter Animation ---
for(let i=0;i<40;i++){
    let g=document.createElement("div");
    g.className="glitter";
    g.style.left=Math.random()*100+"vw";
    g.style.animationDuration=(5+Math.random()*5)+"s";
    document.body.appendChild(g);
}
</script>
