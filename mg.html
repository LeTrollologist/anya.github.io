<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pong Minigame 💖</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{overflow:hidden;min-height:100vh;font-family:'Playfair Display',serif;transition:background 1s linear;}
body::after{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(circle at center,transparent 60%,rgba(0,0,0,0.8));}

/* Header yay */
header{position:absolute;top:0;width:100%;padding:10px 20px;display:flex;justify-content:center;align-items:center;gap:20px;z-index:50;font-family:'Great Vibes',cursive;font-size:clamp(1rem,2vw,1.5rem);color:white;text-shadow:0 0 5px black;}
header a{color:white;text-decoration:none;font-family:'Playfair Display',serif;font-weight:bold;transition:0.3s;}
header a:hover{color:#ff69b4;cursor:pointer;}

/* Canvas container */
#gameContainer{position:absolute;top:60px;left:0;width:100%;height:calc(100% - 100px);display:flex;justify-content:center;align-items:center;z-index:10;}

/* Game Canvas */
#pongCanvas{background:rgba(255,255,255,0.05);border:2px solid rgba(255,105,180,0.6);border-radius:15px;box-shadow:0 0 20px rgba(255,105,180,0.4);}

/* Score */
#score{position:absolute;top:80px;width:100%;text-align:center;font-family:'Great Vibes',cursive;color:white;font-size:clamp(2rem,6vw,3rem);text-shadow:0 0 15px #ff69b4,0 0 25px #ffb6c1;z-index:20;}

/* Footer */
footer{position:absolute;bottom:10px;width:100%;text-align:center;font-size:clamp(0.8rem,2vw,1rem);z-index:10;font-family:'Playfair Display',serif;color:white;text-shadow:0 0 10px black;transition:all 0.3s ease;}
</style>
</head>
<body>
<header>
  💖 Our Magical Love 💖
  <a href="index.html">HOME</a>
  <a href="album.html">ALBUM</a>
  <a href="log.html">LOG</a>
  <a href="status.html">STATUS</a>
</header>

<div id="score">0 💖 : 💖 0</div>
<div id="gameContainer">
  <canvas id="pongCanvas" width="500" height="700"></canvas>
</div>

<footer id="footerCounter"></footer>

<!-- Sun & Moon Canvases -->
<canvas id="sun"></canvas>
<canvas id="moon"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>
<script>
// ===== Day/Night Background & Sun/Moon =====
const lat = 22.5726, lng = 88.3639;
const sunCanvas = document.getElementById("sun"), sunCtx = sunCanvas.getContext("2d");
const moonCanvas = document.getElementById("moon"), moonCtx = moonCanvas.getContext("2d");

function resizeCanvases(){
  sunCanvas.width = moonCanvas.width = innerWidth;
  sunCanvas.height = moonCanvas.height = innerHeight;
}
resizeCanvases();
window.addEventListener("resize", resizeCanvases);

function updateBackground(sunAlt){
  const t = Math.max(0, Math.min(1, (sunAlt + Math.PI/2)/Math.PI));
  const dayColor = `rgb(${25+205*t},${50+130*t},${80+175*t})`;
  const nightColor = `rgb(15,25,50)`;
  document.body.style.background = `linear-gradient(to bottom, ${dayColor}, ${nightColor})`;
}

function drawSky(){
  const now = new Date();
  const sunPos = SunCalc.getPosition(now, lat, lng);
  const sunAlt = sunPos.altitude, sunAz = sunPos.azimuth;
  updateBackground(sunAlt);

  // Sun
  sunCtx.clearRect(0,0,innerWidth,innerHeight);
  if(sunAlt>-0.1){
    const sx = (sunAz+Math.PI)/(2*Math.PI)*innerWidth;
    const sy = innerHeight*(1-(sunAlt+Math.PI/2)/Math.PI);
    sunCtx.beginPath();
    sunCtx.fillStyle = `rgba(255,240,150,${Math.max(0,Math.sin(sunAlt)*0.8)})`;
    sunCtx.arc(sx,sy,80,0,Math.PI*2); sunCtx.fill();
    sunCtx.beginPath();
    sunCtx.fillStyle="yellow"; sunCtx.arc(sx,sy,30,0,Math.PI*2); sunCtx.fill();
  }

  // Moon
  const moonPos = SunCalc.getMoonPosition(now, lat, lng);
  const moonIll = SunCalc.getMoonIllumination(now);
  const moonAlt = moonPos.altitude;
  moonCtx.clearRect(0,0,innerWidth,innerHeight);
  if(moonAlt>-0.1){
    const mx = (moonPos.azimuth+Math.PI)/(2*Math.PI)*innerWidth;
    const my = innerHeight*(1-(moonAlt+Math.PI/2)/Math.PI);
    const fraction = moonIll.fraction;
    moonCtx.beginPath();
    moonCtx.fillStyle="#ddd"; moonCtx.arc(mx,my,25,0,Math.PI*2); moonCtx.fill();
    moonCtx.globalCompositeOperation="destination-out";
    moonCtx.beginPath();
    const shift=25*(1-fraction);
    moonCtx.ellipse(mx+(fraction>0.5?shift:-shift),my,25,25,0,0,Math.PI*2); moonCtx.fill();
    moonCtx.globalCompositeOperation="source-over";
  }
  requestAnimationFrame(drawSky);
}
drawSky();

// Petals & Glitter
for(let i=0;i<40;i++){let p=document.createElement("div");p.className="petal";p.style.left=Math.random()*100+"vw";p.style.animationDuration=(5+Math.random()*5)+"s";p.style.animationTimingFunction=["linear","ease-in","ease-out"][Math.floor(Math.random()*3)];p.style.transform=`rotate(${Math.random()*360}deg)`;document.body.appendChild(p);}
for(let i=0;i<40;i++){let g=document.createElement("div");g.className="glitter";g.style.left=Math.random()*100+"vw";g.style.animationDuration=(5+Math.random()*5)+"s";document.body.appendChild(g);}

// Visitor counter
let visits = localStorage.getItem("anya_visits")||0; visits++;
localStorage.setItem("anya_visits",visits);
const footer=document.getElementById("footerCounter");
footer.innerHTML=`You’ve visited ${visits} times 🌸`;

// ===== Pong Game =====
const canvas=document.getElementById("pongCanvas"), ctx=canvas.getContext("2d");
let width=canvas.width, height=canvas.height;

// Paddles
const paddleWidth=15, paddleHeight=100;
let playerY=height/2-paddleHeight/2;
let aiY=height/2-paddleHeight/2;
const paddleSpeed=10;

// Ball
let ballX=width/2, ballY=height/2, ballRadius=10;
let ballSpeedX=5, ballSpeedY=3;

// Score
let playerScore=0, aiScore=0;

// Touch control
let touchY=null;
canvas.addEventListener("touchmove",(e)=>{
  const touch=e.touches[0].clientY;
  touchY=touch-canvas.getBoundingClientRect().top-paddleHeight/2;
});

// Draw everything
function draw(){
  ctx.clearRect(0,0,width,height);

  // Center line
  ctx.strokeStyle="rgba(255,182,193,0.3)";
  ctx.setLineDash([10,15]);
  ctx.beginPath(); ctx.moveTo(width/2,0); ctx.lineTo(width/2,height); ctx.stroke();
  ctx.setLineDash([]);

  // Paddles
  ctx.fillStyle="pink";
  ctx.fillRect(0,playerY,paddleWidth,paddleHeight);
  ctx.fillStyle="hotpink";
  ctx.fillRect(width-paddleWidth,aiY,paddleWidth,paddleHeight);

  // Ball
  ctx.fillStyle="white";
  ctx.beginPath(); ctx.arc(ballX,ballY,ballRadius,0,Math.PI*2); ctx.fill();

  // Update Ball
  ballX+=ballSpeedX; ballY+=ballSpeedY;

  // Wall collision
  if(ballY<ballRadius || ballY>height-ballRadius) ballSpeedY*=-1;

  // Player collision
  if(ballX-ballRadius<paddleWidth && ballY>playerY && ballY<playerY+paddleHeight) ballSpeedX*=-1;
  if(ballX+ballRadius>width-paddleWidth && ballY>aiY && ballY<aiY+paddleHeight) ballSpeedX*=-1;

  // Score
  if(ballX<0){aiScore++; resetBall();}
  if(ballX>width){playerScore++; resetBall();}
  document.getElementById("score").innerHTML=`${playerScore} 💖 : 💖 ${aiScore}`;

  // AI movement
  const aiCenter=aiY+paddleHeight/2;
  const difficulty=0.08; // Adjust AI speed
  if(aiCenter<ballY) aiY+=5*difficulty*60;
  else aiY-=5*difficulty*60;

  // Player paddle follow touch
  if(touchY!==null){
    playerY+=(touchY-playerY)*0.2;
  }

  requestAnimationFrame(draw);
}

// Reset ball to center
function resetBall(){
  ballX=width/2; ballY=height/2;
  ballSpeedX=-ballSpeedX;
  ballSpeedY=(Math.random()*6-3);
}

draw();
</script>
</body>
</html>
