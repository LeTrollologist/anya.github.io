<canvas id="pongCanvas"></canvas>
<script>
const canvas = document.getElementById("pongCanvas");
const ctx = canvas.getContext("2d");

// Set canvas size dynamically based on window
function resizeCanvas() {
  // Leave some space for header/footer
  canvas.width = Math.min(window.innerWidth - 20, 500);
  canvas.height = Math.min(window.innerHeight - 120, 700);
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

// Game variables
let width = canvas.width, height = canvas.height;
const paddleWidth = 15, paddleHeight = 100;
let playerY = height/2 - paddleHeight/2;
let aiY = height/2 - paddleHeight/2;
let ballX = width/2, ballY = height/2, ballRadius = 10;
let ballSpeedX = 5, ballSpeedY = 3;
let playerScore = 0, aiScore = 0;

// Touch control
let touchY = null;
canvas.addEventListener("touchmove", (e) => {
  const touch = e.touches[0].clientY - canvas.getBoundingClientRect().top;
  touchY = touch - paddleHeight/2;
});

// Keyboard control
let upPressed = false, downPressed = false;
document.addEventListener("keydown", e => {
  if(e.key === "ArrowUp" || e.key === "w") upPressed = true;
  if(e.key === "ArrowDown" || e.key === "s") downPressed = true;
});
document.addEventListener("keyup", e => {
  if(e.key === "ArrowUp" || e.key === "w") upPressed = false;
  if(e.key === "ArrowDown" || e.key === "s") downPressed = false;
});

// Draw and update game
function draw(){
  width = canvas.width; height = canvas.height;
  ctx.clearRect(0, 0, width, height);

  // Center line
  ctx.strokeStyle = "rgba(255,182,193,0.3)";
  ctx.setLineDash([10,15]);
  ctx.beginPath(); ctx.moveTo(width/2,0); ctx.lineTo(width/2,height); ctx.stroke();
  ctx.setLineDash([]);

  // Paddles
  ctx.fillStyle="pink"; ctx.fillRect(0, playerY, paddleWidth, paddleHeight);
  ctx.fillStyle="hotpink"; ctx.fillRect(width - paddleWidth, aiY, paddleWidth, paddleHeight);

  // Ball
  ctx.fillStyle="white"; ctx.beginPath(); ctx.arc(ballX, ballY, ballRadius, 0, Math.PI*2); ctx.fill();

  // Ball movement
  ballX += ballSpeedX; ballY += ballSpeedY;

  // Wall collision
  if(ballY < ballRadius || ballY > height - ballRadius) ballSpeedY *= -1;

  // Paddle collision
  if(ballX - ballRadius < paddleWidth && ballY > playerY && ballY < playerY + paddleHeight) ballSpeedX *= -1;
  if(ballX + ballRadius > width - paddleWidth && ballY > aiY && ballY < aiY + paddleHeight) ballSpeedX *= -1;

  // Score
  if(ballX < 0){ aiScore++; resetBall(); }
  if(ballX > width){ playerScore++; resetBall(); }
  document.getElementById("score").innerHTML = `${playerScore} 💖 : 💖 ${aiScore}`;

  // AI
  const aiCenter = aiY + paddleHeight/2;
  const difficulty = 0.08; 
  if(aiCenter < ballY) aiY += 5 * difficulty * 60;
  else aiY -= 5 * difficulty * 60;

  // Player paddle
  if(touchY !== null){ playerY += (touchY - playerY)*0.2; }
  if(upPressed) playerY -= 8;
  if(downPressed) playerY += 8;
  if(playerY < 0) playerY = 0;
  if(playerY + paddleHeight > height) playerY = height - paddleHeight;

  requestAnimationFrame(draw);
}

// Reset ball
function resetBall(){
  ballX = width/2; ballY = height/2;
  ballSpeedX = -ballSpeedX;
  ballSpeedY = (Math.random()*6 - 3);
}

draw();
</script>
